<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>만 나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          keyframes: {
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px) scale(0.95)' },
              '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
            },
            countUp: {
              '0%': { opacity: '0', transform: 'scale(0.3)' },
              '50%': { transform: 'scale(1.15)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            progressFill: {
              '0%': { width: '0%' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-6px)' },
            },
            sparkle: {
              '0%, 100%': { opacity: '0', transform: 'scale(0) rotate(0deg)' },
              '50%': { opacity: '1', transform: 'scale(1) rotate(180deg)' },
            },
          },
          animation: {
            slideUp: 'slideUp 0.5s ease-out forwards',
            countUp: 'countUp 0.6s ease-out forwards',
            progressFill: 'progressFill 1s ease-out forwards',
            float: 'float 3s ease-in-out infinite',
            sparkle: 'sparkle 2s ease-in-out infinite',
          },
        },
      },
    };
  </script>
  <style>
    .card-hover { transition: transform 0.3s, box-shadow 0.3s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
    .stat-card { transition: transform 0.2s, background 0.2s; }
    .stat-card:hover { transform: scale(1.05); }
    .btn-pulse:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl p-8 sm:p-10 card-hover ${className}`}>
          {children}
        </div>
      );
    }

    function Button({ children, onClick, disabled, className = '' }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`w-full py-4 bg-gradient-to-r from-blue-500 to-indigo-500 hover:from-blue-600 hover:to-indigo-600 disabled:from-slate-300 disabled:to-slate-300 disabled:cursor-not-allowed text-white font-bold rounded-xl transition-all btn-pulse shadow-lg shadow-blue-200 hover:shadow-blue-300 text-lg ${className}`}
        >
          {children}
        </button>
      );
    }

    function StatCard({ icon, label, value, color, delay = 0 }) {
      return (
        <div
          className={`stat-card p-4 rounded-2xl text-center cursor-default animate-slideUp ${color}`}
          style={{ animationDelay: `${delay}ms` }}
        >
          <div className="text-2xl mb-1">{icon}</div>
          <div className="text-2xl font-bold">{value}</div>
          <div className="text-xs opacity-70 mt-0.5">{label}</div>
        </div>
      );
    }

    function ProgressRing({ percent, size = 140, stroke = 10 }) {
      const radius = (size - stroke) / 2;
      const circumference = 2 * Math.PI * radius;
      const [offset, setOffset] = useState(circumference);

      useEffect(() => {
        const timer = setTimeout(() => {
          setOffset(circumference - (percent / 100) * circumference);
        }, 100);
        return () => clearTimeout(timer);
      }, [percent, circumference]);

      return (
        <svg width={size} height={size} className="mx-auto -rotate-90">
          <circle
            cx={size / 2} cy={size / 2} r={radius}
            fill="none" stroke="#e2e8f0" strokeWidth={stroke}
          />
          <circle
            cx={size / 2} cy={size / 2} r={radius}
            fill="none" stroke="url(#gradient)" strokeWidth={stroke}
            strokeDasharray={circumference}
            strokeDashoffset={offset}
            strokeLinecap="round"
            style={{ transition: 'stroke-dashoffset 1.2s ease-out' }}
          />
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#3b82f6" />
              <stop offset="100%" stopColor="#8b5cf6" />
            </linearGradient>
          </defs>
        </svg>
      );
    }

    // ========================================
    // 📄 AgeCalculator Component
    // ========================================

    function AgeCalculator() {
      const [birthday, setBirthday] = useState('');
      const [result, setResult] = useState(null);
      const [showResult, setShowResult] = useState(false);
      const resultRef = useRef(null);

      function calculate() {
        if (!birthday) return;

        const birth = new Date(birthday);
        const today = new Date();

        let age = today.getFullYear() - birth.getFullYear();
        const monthDiff = today.getMonth() - birth.getMonth();
        const dayDiff = today.getDate() - birth.getDate();

        if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
          age--;
        }

        let nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
        if (nextBirthday <= today) {
          nextBirthday = new Date(today.getFullYear() + 1, birth.getMonth(), birth.getDate());
        }
        const daysUntil = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));

        const totalDays = Math.floor((today - birth) / (1000 * 60 * 60 * 24));
        const totalWeeks = Math.floor(totalDays / 7);
        const totalMonths = (today.getFullYear() - birth.getFullYear()) * 12 + today.getMonth() - birth.getMonth();

        const zodiacSigns = ['♑ 염소', '♒ 물병', '♓ 물고기', '♈ 양', '♉ 황소', '♊ 쌍둥이', '♋ 게', '♌ 사자', '♍ 처녀', '♎ 천칭', '♏ 전갈', '♐ 궁수', '♑ 염소'];
        const zodiacDates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22];
        const m = birth.getMonth();
        const d = birth.getDate();
        const zodiac = d < zodiacDates[m] ? zodiacSigns[m] : zodiacSigns[m + 1];

        const animals = ['원숭이', '닭', '개', '돼지', '쥐', '소', '호랑이', '토끼', '용', '뱀', '말', '양'];
        const animalEmojis = ['🐵', '🐔', '🐶', '🐷', '🐭', '🐮', '🐯', '🐰', '🐲', '🐍', '🐴', '🐑'];
        const animalIdx = birth.getFullYear() % 12;
        const animal = `${animalEmojis[animalIdx]} ${animals[animalIdx]}띠`;

        const yearProgress = ((365 - daysUntil) / 365) * 100;

        setShowResult(false);
        setTimeout(() => {
          setResult({
            age,
            birthYear: birth.getFullYear(),
            birthMonth: birth.getMonth() + 1,
            birthDay: birth.getDate(),
            daysUntil,
            totalDays,
            totalWeeks,
            totalMonths,
            zodiac,
            animal,
            yearProgress: Math.min(100, Math.max(0, yearProgress)),
            isBirthdayToday: daysUntil === 365 || daysUntil === 0,
          });
          setShowResult(true);
        }, 100);
      }

      useEffect(() => {
        if (showResult && resultRef.current) {
          resultRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }, [showResult]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 overflow-hidden pointer-events-none">
            <div className="absolute top-20 left-10 w-72 h-72 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float" />
            <div className="absolute top-40 right-10 w-72 h-72 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float" style={{ animationDelay: '1s' }} />
            <div className="absolute bottom-20 left-1/3 w-72 h-72 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-float" style={{ animationDelay: '2s' }} />
          </div>

          <div className="relative z-10 w-full max-w-md">
            <Card>
              <h1 className="text-3xl font-extrabold text-center bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent mb-2">
                만 나이 계산기
              </h1>
              <p className="text-center text-slate-400 text-sm mb-8">생년월일을 입력하고 나의 나이 정보를 확인하세요</p>

              <label className="block text-sm font-semibold text-slate-600 mb-2">
                🗓️ 생년월일
              </label>
              <input
                type="date"
                value={birthday}
                max={new Date().toISOString().split('T')[0]}
                onChange={(e) => setBirthday(e.target.value)}
                className="w-full px-4 py-3.5 border-2 border-slate-200 rounded-xl text-base outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition-all bg-white"
              />

              <div className="mt-6">
                <Button onClick={calculate} disabled={!birthday}>
                  🔍 계산하기
                </Button>
              </div>

              {showResult && result && (
                <div ref={resultRef} className="mt-8 space-y-5 animate-slideUp">
                  {result.isBirthdayToday && (
                    <div className="relative text-center py-3 bg-gradient-to-r from-amber-50 to-orange-50 rounded-xl border border-amber-200">
                      <span className="absolute -top-3 left-4 animate-sparkle">✨</span>
                      <span className="absolute -top-3 right-4 animate-sparkle" style={{ animationDelay: '0.5s' }}>✨</span>
                      <span className="text-lg font-bold text-amber-600">🎉 오늘이 생일이에요!</span>
                    </div>
                  )}

                  <div className="relative flex flex-col items-center py-6">
                    <ProgressRing percent={result.yearProgress} />
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center">
                      <div className="text-4xl font-black bg-gradient-to-b from-blue-500 to-indigo-600 bg-clip-text text-transparent animate-countUp">
                        {result.age}세
                      </div>
                      <div className="text-xs text-slate-400">만 나이</div>
                    </div>
                    <p className="mt-4 text-sm text-slate-500">
                      다음 생일까지 <span className="font-bold text-indigo-600">{result.daysUntil}일</span>
                    </p>
                    <div className="w-full bg-slate-100 rounded-full h-2 mt-2 overflow-hidden">
                      <div
                        className="h-full bg-gradient-to-r from-blue-400 to-indigo-500 rounded-full animate-progressFill"
                        style={{ width: `${result.yearProgress}%` }}
                      />
                    </div>
                    <div className="flex justify-between w-full text-xs text-slate-400 mt-1">
                      <span>지난 생일</span>
                      <span>다음 생일</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-3 gap-3">
                    <StatCard icon="📅" label="일" value={result.totalDays.toLocaleString()} color="bg-blue-50 text-blue-700" delay={100} />
                    <StatCard icon="📆" label="주" value={result.totalWeeks.toLocaleString()} color="bg-indigo-50 text-indigo-700" delay={200} />
                    <StatCard icon="🗓️" label="개월" value={result.totalMonths.toLocaleString()} color="bg-violet-50 text-violet-700" delay={300} />
                  </div>

                  <div className="grid grid-cols-2 gap-3">
                    <StatCard icon="⭐" label="별자리" value={result.zodiac} color="bg-amber-50 text-amber-700" delay={400} />
                    <StatCard icon="🏮" label="띠" value={result.animal} color="bg-red-50 text-red-700" delay={500} />
                  </div>

                  <div className="text-center text-sm text-slate-400 pt-2 animate-slideUp" style={{ animationDelay: '600ms' }}>
                    {result.birthYear}년 {result.birthMonth}월 {result.birthDay}일 출생
                  </div>
                </div>
              )}
            </Card>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      return <AgeCalculator />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

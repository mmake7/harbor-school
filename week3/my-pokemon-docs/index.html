<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .pokemon-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .pokemon-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-red-50 via-yellow-50 to-blue-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect } = React;

    // ========================================
    // API Client
    // ========================================
    async function fetchPokemons(query) {
      const q = (query || '').trim();
      const url = q
        ? `/api/pokemons/search?q=${encodeURIComponent(q)}`
        : '/api/pokemons';
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`서버 오류: ${res.status}`);
      }
      const json = await res.json();
      if (!json.success) {
        throw new Error(json.message || '알 수 없는 오류');
      }
      return json.data;
    }

    // Type color mapping (Tailwind classes)
    const TYPE_COLORS = {
      normal:   'bg-gray-400 text-white',
      fire:     'bg-orange-500 text-white',
      water:    'bg-blue-500 text-white',
      electric: 'bg-yellow-400 text-gray-900',
      grass:    'bg-green-500 text-white',
      ice:      'bg-cyan-300 text-gray-900',
      fighting: 'bg-red-700 text-white',
      poison:   'bg-purple-600 text-white',
      ground:   'bg-yellow-700 text-white',
      flying:   'bg-indigo-300 text-gray-900',
      psychic:  'bg-pink-500 text-white',
      bug:      'bg-lime-500 text-white',
      rock:     'bg-yellow-800 text-white',
      ghost:    'bg-indigo-700 text-white',
      dragon:   'bg-indigo-600 text-white',
      dark:     'bg-gray-800 text-white',
      steel:    'bg-gray-500 text-white',
      fairy:    'bg-pink-300 text-gray-900',
    };

    // ========================================
    // Design System Components
    // ========================================
    function Input({ value, onChange, placeholder, className = '' }) {
      return (
        <input
          type="text"
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          className={`w-full px-5 py-3 rounded-full border-2 border-gray-200 bg-white shadow-sm focus:outline-none focus:border-red-400 focus:ring-4 focus:ring-red-100 transition ${className}`}
        />
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`pokemon-card bg-white rounded-2xl shadow-md overflow-hidden border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    function TypeBadge({ type }) {
      const colorClass = TYPE_COLORS[type] || 'bg-gray-300 text-gray-900';
      return (
        <span className={`inline-block px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wide ${colorClass}`}>
          {type}
        </span>
      );
    }

    // ========================================
    // Common / Layout Components
    // ========================================
    function Header() {
      return (
        <header className="text-center pt-10 pb-6">
          <h1 className="text-4xl md:text-5xl font-extrabold text-gray-800 tracking-tight">
            <span className="text-red-500">Poké</span>
            <span className="text-blue-500">dex</span>
            <span className="text-gray-700"> Search</span>
          </h1>
          <p className="mt-3 text-gray-600">이름으로 포켓몬을 찾아보세요</p>
        </header>
      );
    }

    function PokemonCard({ pokemon }) {
      return (
        <Card>
          <div className="bg-gradient-to-b from-gray-50 to-gray-100 flex justify-center p-4">
            <img
              src={pokemon.sprite}
              alt={pokemon.name}
              className="w-32 h-32 object-contain drop-shadow-md"
              loading="lazy"
            />
          </div>
          <div className="p-5">
            <div className="flex items-center justify-between mb-2">
              <div>
                <h2 className="text-xl font-bold text-gray-800">{pokemon.name}</h2>
                {pokemon.englishName && (
                  <p className="text-xs text-gray-400 uppercase tracking-wide">{pokemon.englishName}</p>
                )}
              </div>
              <span className="text-sm text-gray-400 font-mono">
                #{String(pokemon.id).padStart(3, '0')}
              </span>
            </div>
            <div className="flex gap-2 mb-3 flex-wrap">
              {pokemon.types.map((type) => (
                <TypeBadge key={type} type={type} />
              ))}
            </div>
            <p className="text-sm text-gray-600 leading-relaxed">{pokemon.description}</p>
          </div>
        </Card>
      );
    }

    function LoadingState() {
      return (
        <div className="col-span-full flex flex-col items-center justify-center py-16 text-center">
          <div className="text-6xl mb-4 animate-bounce">⚡</div>
          <p className="text-gray-600">서버에서 포켓몬을 불러오는 중...</p>
        </div>
      );
    }

    function ErrorState({ message, onRetry }) {
      return (
        <div className="col-span-full flex flex-col items-center justify-center py-16 text-center">
          <div className="text-6xl mb-4">⚠️</div>
          <h3 className="text-xl font-bold text-gray-700 mb-2">서버 연결 실패</h3>
          <p className="text-gray-500 mb-4">{message}</p>
          <button
            onClick={onRetry}
            className="px-5 py-2 bg-red-500 text-white rounded-full font-semibold hover:bg-red-600 transition"
          >
            다시 시도
          </button>
        </div>
      );
    }

    function EmptyState({ query }) {
      return (
        <div className="col-span-full flex flex-col items-center justify-center py-16 text-center">
          <div className="text-6xl mb-4">🔍</div>
          <h3 className="text-xl font-bold text-gray-700 mb-2">검색 결과가 없습니다</h3>
          <p className="text-gray-500">
            "<span className="font-semibold text-gray-700">{query}</span>" 와(과) 일치하는 포켓몬을 찾을 수 없습니다.
          </p>
          <p className="text-sm text-gray-400 mt-2">다른 이름으로 검색해보세요.</p>
        </div>
      );
    }

    // ========================================
    // Page Component: Pokemon Search
    // ========================================
    function PokemonSearchPage() {
      const [query, setQuery] = useState('');
      const [pokemons, setPokemons] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [reloadKey, setReloadKey] = useState(0);

      useEffect(() => {
        let cancelled = false;
        setLoading(true);
        setError(null);

        const timer = setTimeout(() => {
          fetchPokemons(query)
            .then((data) => {
              if (!cancelled) {
                setPokemons(data);
                setLoading(false);
              }
            })
            .catch((err) => {
              if (!cancelled) {
                setError(err.message);
                setLoading(false);
              }
            });
        }, query ? 250 : 0);

        return () => {
          cancelled = true;
          clearTimeout(timer);
        };
      }, [query, reloadKey]);

      const handleRetry = () => setReloadKey((k) => k + 1);

      return (
        <main className="max-w-6xl mx-auto px-4 pb-16">
          <Header />

          <div className="max-w-xl mx-auto mb-10">
            <Input
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="포켓몬 이름을 입력하세요... (예: 피카츄, Pikachu)"
            />
            <p className="text-center text-sm text-gray-500 mt-3">
              {loading
                ? '불러오는 중...'
                : error
                ? '서버 연결에 실패했습니다'
                : <>총 <span className="font-semibold text-gray-700">{pokemons.length}</span> 마리 표시 중</>}
            </p>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            {loading ? (
              <LoadingState />
            ) : error ? (
              <ErrorState message={error} onRetry={handleRetry} />
            ) : pokemons.length === 0 ? (
              <EmptyState query={query} />
            ) : (
              pokemons.map((pokemon) => (
                <PokemonCard key={pokemon.id} pokemon={pokemon} />
              ))
            )}
          </div>
        </main>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      return <PokemonSearchPage />;
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

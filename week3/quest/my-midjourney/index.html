<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한지 위의 먹그림</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&family=Gaegu:wght@400;700&family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #ebe0c8;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(180, 140, 90, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(160, 120, 70, 0.10) 0%, transparent 40%),
        repeating-linear-gradient(
          90deg,
          rgba(140, 100, 60, 0.03) 0px,
          rgba(140, 100, 60, 0.03) 2px,
          transparent 2px,
          transparent 8px
        );
      min-height: 100vh;
    }
    .font-brush { font-family: 'Nanum Brush Script', cursive; }
    .font-gaegu { font-family: 'Gaegu', cursive; }
    .font-serif-kr { font-family: 'Noto Serif KR', serif; }

    /* 한옥 나무 벽 느낌 테두리 */
    .hanok-frame {
      border: 8px solid #5c3a1f;
      border-image: linear-gradient(135deg, #6b4423, #3e2817, #6b4423) 1;
    }

    /* 족자 */
    .scroll-wrapper {
      position: relative;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.25));
    }
    .scroll-rod {
      height: 28px;
      background: linear-gradient(180deg, #8b5a2b 0%, #5c3a1f 50%, #3e2817 100%);
      border-radius: 14px;
      position: relative;
      box-shadow: inset 0 2px 3px rgba(255,255,255,0.2), inset 0 -2px 3px rgba(0,0,0,0.4);
    }
    .scroll-rod::before,
    .scroll-rod::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 42px;
      border-radius: 6px;
      background: linear-gradient(180deg, #b91c1c 0%, #7f1d1d 100%);
      box-shadow: inset 0 0 4px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
      border: 2px solid #14532d;
    }
    .scroll-rod::before { left: -14px; }
    .scroll-rod::after { right: -14px; }

    .scroll-paper {
      background: linear-gradient(180deg, #fbf6e9 0%, #f4ebd3 50%, #ede0bd 100%);
      position: relative;
      padding: 32px 28px 24px;
      box-shadow:
        inset 0 0 40px rgba(139, 90, 43, 0.18),
        inset 0 0 80px rgba(139, 90, 43, 0.08);
    }
    .scroll-paper::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(139, 90, 43, 0.08), transparent 30%),
        radial-gradient(circle at 90% 80%, rgba(139, 90, 43, 0.10), transparent 30%);
      mix-blend-mode: multiply;
    }
    .scroll-cord {
      width: 4px;
      height: 30px;
      background: linear-gradient(180deg, #b91c1c 0%, #7f1d1d 100%);
      margin: 0 auto -2px;
      border-radius: 2px;
    }

    /* 낙관 도장 */
    .seal {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #c0392b 0%, #922b21 100%);
      color: #fbf6e9;
      font-family: 'Noto Serif KR', serif;
      font-weight: 900;
      font-size: 20px;
      border-radius: 4px;
      box-shadow:
        inset 0 0 2px rgba(0,0,0,0.3),
        0 1px 2px rgba(0,0,0,0.2);
      letter-spacing: -2px;
      line-height: 1;
      writing-mode: vertical-rl;
      transform: rotate(0deg);
      opacity: 0.92;
      position: relative;
    }
    .seal::after {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1.5px solid rgba(251, 246, 233, 0.6);
      border-radius: 2px;
      pointer-events: none;
    }

    /* 먹물 번짐 로딩 */
    @keyframes ink-spread {
      0% { transform: scale(0.3); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .ink-dot {
      position: absolute;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, rgba(20,20,20,0.7) 0%, rgba(20,20,20,0.2) 60%, transparent 100%);
      border-radius: 50%;
      animation: ink-spread 1.8s ease-out infinite;
    }
    .ink-dot:nth-child(1) { top: 20%; left: 25%; animation-delay: 0s; }
    .ink-dot:nth-child(2) { top: 60%; left: 55%; animation-delay: 0.4s; }
    .ink-dot:nth-child(3) { top: 35%; left: 75%; animation-delay: 0.8s; }
    .ink-dot:nth-child(4) { top: 70%; left: 20%; animation-delay: 1.2s; }

    .category-btn {
      transition: all 0.2s ease;
    }
    .category-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(92, 58, 31, 0.25);
    }
    .category-btn.active {
      background: linear-gradient(135deg, #5c3a1f 0%, #3e2817 100%);
      color: #fbf6e9;
    }

    .draw-btn {
      background: linear-gradient(135deg, #c0392b 0%, #922b21 100%);
      color: #fbf6e9;
      font-family: 'Noto Serif KR', serif;
      font-weight: 700;
      letter-spacing: 4px;
      box-shadow: 0 4px 10px rgba(146, 43, 33, 0.4);
      transition: all 0.2s;
    }
    .draw-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(146, 43, 33, 0.5);
    }
    .draw-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* 모달 */
    .modal-backdrop {
      background: rgba(20, 15, 10, 0.85);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const CATEGORIES = [
      {
        id: 'landscape',
        label: '풍경',
        emoji: '🏞️',
        examples: [
          '경회루와 달빛',
          '북한산 산봉우리와 안개',
          '한양 도성의 저녁 풍경',
          '강가의 버드나무와 배',
          '초가집과 대나무 숲',
        ],
      },
      {
        id: 'person',
        label: '인물',
        emoji: '👤',
        examples: [
          '책 읽는 선비',
          '빨래하는 아낙',
          '연을 날리는 아이들',
          '말 타는 장군',
          '부채춤 추는 기생',
        ],
      },
      {
        id: 'animal',
        label: '동물',
        emoji: '🐯',
        examples: [
          '소나무 위의 호랑이',
          '연못의 잉어 세 마리',
          '학 두 마리',
          '까치와 매화',
          '토끼와 달',
        ],
      },
      {
        id: 'object',
        label: '사물',
        emoji: '🏺',
        examples: [
          '청자 주전자와 찻잔',
          '매화꽃이 꽂힌 도자기',
          '책과 붓과 벼루',
          '부채와 접부채',
          '병풍과 향로',
        ],
      },
    ];

    function randomFrom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function Scroll({ item, onClickImage, onDownload }) {
      return (
        <div className="scroll-wrapper my-10">
          <div className="scroll-cord" />
          <div className="scroll-rod" />
          <div className="scroll-paper">
            <img
              src={item.imageUrl}
              alt={item.prompt}
              className="w-full aspect-square object-cover cursor-pointer rounded-sm"
              style={{ boxShadow: 'inset 0 0 20px rgba(0,0,0,0.1)' }}
              onClick={() => onClickImage(item)}
            />
            <div className="mt-4 flex items-end justify-between gap-4">
              <p
                className="font-brush text-4xl text-stone-800 flex-1 leading-tight"
                style={{ textShadow: '0 1px 0 rgba(255,255,255,0.5)' }}
              >
                {item.prompt}
              </p>
              <div className="seal shrink-0" title="낙관">홍도</div>
            </div>
            <div className="mt-4 flex justify-end">
              <button
                onClick={() => onDownload(item)}
                className="text-xs px-3 py-1.5 bg-stone-800 text-amber-50 rounded hover:bg-stone-900 transition"
              >
                ⬇ 저장
              </button>
            </div>
          </div>
          <div className="scroll-rod" />
        </div>
      );
    }

    function Modal({ item, onClose }) {
      useEffect(() => {
        const handler = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [onClose]);

      if (!item) return null;
      return (
        <div
          className="modal-backdrop fixed inset-0 z-50 flex items-center justify-center p-6"
          onClick={onClose}
        >
          <div className="max-w-4xl w-full" onClick={(e) => e.stopPropagation()}>
            <img src={item.imageUrl} alt={item.prompt} className="w-full rounded" />
            <p className="font-brush text-5xl text-amber-50 mt-6 text-center">
              {item.prompt}
            </p>
          </div>
          <button
            onClick={onClose}
            className="absolute top-6 right-6 text-amber-50 text-3xl hover:scale-110 transition"
          >
            ✕
          </button>
        </div>
      );
    }

    function App() {
      const [prompt, setPrompt] = useState('');
      const [activeCategory, setActiveCategory] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [gallery, setGallery] = useState([]);
      const [modalItem, setModalItem] = useState(null);

      const pickExample = (cat) => {
        setActiveCategory(cat.id);
        setPrompt(randomFrom(cat.examples));
        setError('');
      };

      const handleGenerate = async () => {
        const trimmed = prompt.trim();
        if (!trimmed) {
          setError('프롬프트를 입력해주세요.');
          return;
        }
        setLoading(true);
        setError('');
        try {
          const resp = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: trimmed }),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || '생성 실패');

          // 이미지 완전히 로드될 때까지 대기
          await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = resolve;
            img.onerror = reject;
            img.src = data.imageUrl;
          });

          setGallery((g) => [
            { id: Date.now(), imageUrl: data.imageUrl, prompt: trimmed },
            ...g,
          ]);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      const handleDownload = async (item) => {
        try {
          const resp = await fetch(item.imageUrl);
          const blob = await resp.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${item.prompt}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } catch (e) {
          alert('다운로드 실패: ' + e.message);
        }
      };

      const clearGallery = () => {
        if (confirm('갤러리를 모두 비울까요?')) setGallery([]);
      };

      return (
        <div className="min-h-screen">
          <header className="py-12 text-center">
            <h1 className="font-serif-kr text-5xl md:text-6xl font-black text-stone-800 tracking-wider">
              한지 위의 먹그림
            </h1>
            <p className="font-gaegu text-xl md:text-2xl text-stone-600 mt-3">
              김홍도 · 신윤복의 붓끝에서 피어나는 조선의 풍경
            </p>
            <div className="w-24 h-0.5 bg-stone-700 mx-auto mt-6 opacity-50" />
          </header>

          <main className="max-w-4xl mx-auto px-4 pb-16">
            {/* 카테고리 */}
            <section className="mb-6">
              <h2 className="font-serif-kr text-lg text-stone-700 mb-3 text-center">
                ✦ 무엇을 그릴까요? ✦
              </h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                {CATEGORIES.map((cat) => (
                  <button
                    key={cat.id}
                    onClick={() => pickExample(cat)}
                    className={`category-btn bg-amber-50 border-2 border-stone-700 rounded-lg py-5 px-3 text-stone-800 ${activeCategory === cat.id ? 'active' : ''}`}
                  >
                    <div className="text-4xl mb-1">{cat.emoji}</div>
                    <div className="font-serif-kr font-bold text-lg">{cat.label}</div>
                  </button>
                ))}
              </div>
              <p className="text-xs text-stone-500 text-center mt-2">
                카테고리를 누르면 예시가 자동으로 채워집니다. 그대로 써도 되고 수정해도 됩니다.
              </p>
            </section>

            {/* 프롬프트 입력 */}
            <section className="mb-8">
              <div className="bg-amber-50 border-2 border-stone-700 rounded-lg p-5 shadow-md">
                <textarea
                  value={prompt}
                  onChange={(e) => { setPrompt(e.target.value); setError(''); }}
                  placeholder="그리고 싶은 장면을 한 문장으로…"
                  rows={2}
                  className="w-full bg-transparent font-gaegu text-2xl text-stone-800 placeholder-stone-400 resize-none focus:outline-none"
                />
                <div className="flex items-center justify-between mt-3 pt-3 border-t border-stone-300">
                  <span className="text-xs text-stone-500">
                    ※ 김홍도·신윤복 화풍이 자동 적용됩니다
                  </span>
                  <button
                    onClick={handleGenerate}
                    disabled={loading || !prompt.trim()}
                    className="draw-btn px-6 py-2.5 rounded"
                  >
                    {loading ? '그리는 중…' : '그 리 기'}
                  </button>
                </div>
                {error && (
                  <p className="mt-3 text-red-700 text-sm">{error}</p>
                )}
              </div>
            </section>

            {/* 로딩 */}
            {loading && (
              <div className="relative h-64 flex items-center justify-center mb-8">
                <div className="ink-dot" />
                <div className="ink-dot" />
                <div className="ink-dot" />
                <div className="ink-dot" />
                <p className="font-brush text-4xl text-stone-800 z-10">
                  붓을 들어 그리는 중…
                </p>
              </div>
            )}

            {/* 갤러리 */}
            {gallery.length > 0 && (
              <section>
                <div className="flex items-center justify-between mb-4">
                  <h2 className="font-serif-kr text-2xl text-stone-800">
                    ✦ 족자 갤러리 ({gallery.length})
                  </h2>
                  <button
                    onClick={clearGallery}
                    className="text-sm text-stone-600 hover:text-red-700 underline"
                  >
                    갤러리 초기화
                  </button>
                </div>
                <div className="space-y-8">
                  {gallery.map((item) => (
                    <Scroll
                      key={item.id}
                      item={item}
                      onClickImage={setModalItem}
                      onDownload={handleDownload}
                    />
                  ))}
                </div>
              </section>
            )}

            {gallery.length === 0 && !loading && (
              <div className="text-center text-stone-500 font-gaegu text-xl mt-10">
                아직 그려진 그림이 없습니다.<br />
                카테고리를 고르고 붓을 들어보세요.
              </div>
            )}
          </main>

          <footer className="py-8 text-center text-stone-600 text-sm">
            <p className="font-gaegu">— harbor.school week3 quest · My Midjourney —</p>
          </footer>

          <Modal item={modalItem} onClose={() => setModalItem(null)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

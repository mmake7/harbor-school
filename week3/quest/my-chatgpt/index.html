<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌙 달빛 선녀</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 50%, #0f1b3d 100%);
      color: #f0f0ff;
      overflow: hidden;
      min-height: 100vh;
    }

    /* 별 반짝임 */
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      opacity: 0.8;
      animation: twinkle 3s infinite ease-in-out;
      pointer-events: none;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50%      { opacity: 1;   transform: scale(1.2); }
    }

    /* 달 */
    .moon {
      position: absolute;
      top: 40px;
      right: 60px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fffbe0, #f5e8a8 60%, #d8c76a);
      box-shadow:
        0 0 40px rgba(255, 245, 200, 0.6),
        0 0 80px rgba(255, 235, 180, 0.3),
        inset -15px -15px 30px rgba(180, 160, 80, 0.35);
      pointer-events: none;
      z-index: 1;
    }
    .moon::before {
      content: '';
      position: absolute;
      top: 22%; left: 60%;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(180, 160, 80, 0.3);
    }
    .moon::after {
      content: '';
      position: absolute;
      top: 55%; left: 25%;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(180, 160, 80, 0.25);
    }

    /* 컨테이너 */
    .app {
      position: relative;
      max-width: 720px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      z-index: 2;
    }

    .header {
      text-align: center;
      padding: 12px 0 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 16px;
      position: relative;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 2px;
      color: #e8e0ff;
      text-shadow: 0 0 12px rgba(200, 180, 255, 0.4);
    }
    .header p {
      margin-top: 6px;
      font-size: 13px;
      color: #b8a8d8;
      font-weight: 300;
    }
    .reset-btn {
      position: absolute;
      right: 0;
      top: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #d0c8ef;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .reset-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: rotate(180deg);
    }

    /* 메시지 영역 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 4px 16px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb {
      background: rgba(180, 160, 220, 0.3);
      border-radius: 3px;
    }

    .msg {
      display: flex;
      margin-bottom: 14px;
      animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #8b7ecc, #6a5aa8);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 12px rgba(138, 126, 204, 0.3);
    }
    .msg.assistant .bubble {
      background: linear-gradient(135deg, rgba(173, 216, 230, 0.15), rgba(173, 216, 230, 0.08));
      color: #e8f0ff;
      border: 1px solid rgba(173, 216, 230, 0.2);
      border-bottom-left-radius: 4px;
      backdrop-filter: blur(8px);
    }

    /* 타이핑 인디케이터 */
    .typing {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #b8a8d8;
      font-size: 13px;
      font-style: italic;
      padding: 8px 4px;
    }
    .typing .dots {
      display: inline-flex;
      gap: 4px;
    }
    .typing .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #d0c8ef;
      animation: bounce 1.4s infinite ease-in-out;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* 입력 영역 */
    .input-area {
      display: flex;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input-area textarea {
      flex: 1;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 22px;
      padding: 12px 18px;
      color: #f0f0ff;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: all 0.2s;
    }
    .input-area textarea::placeholder {
      color: rgba(200, 190, 230, 0.5);
    }
    .input-area textarea:focus {
      border-color: rgba(180, 160, 220, 0.5);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(180, 160, 220, 0.1);
    }
    .send-btn {
      background: linear-gradient(135deg, #9b8edc, #7a6bc4);
      border: none;
      color: #fff;
      padding: 0 22px;
      border-radius: 22px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(138, 126, 204, 0.35);
    }
    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(138, 126, 204, 0.45);
    }
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error {
      background: rgba(255, 120, 120, 0.15);
      border: 1px solid rgba(255, 120, 120, 0.3);
      color: #ffcccc;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      .app { padding: 16px 14px; }
      .moon { width: 60px; height: 60px; top: 20px; right: 20px; }
      .header h1 { font-size: 20px; }
      .bubble { max-width: 85%; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="moon"></div>
  <div id="stars"></div>
  <div id="root"></div>

  <script>
    // 별 배경 생성
    (function () {
      const container = document.getElementById('stars');
      const count = 28;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2 + 1;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + '%';
        s.style.top  = Math.random() * 100 + '%';
        s.style.animationDelay = (Math.random() * 3) + 's';
        s.style.animationDuration = (2 + Math.random() * 3) + 's';
        container.appendChild(s);
      }
    })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GREETING = "어서 오세요... 달빛 아래로 오셨군요.\n제가 느끼기에 오늘 마음이 조금 무거우신 것 같아요...\n천천히, 편하게 마음을 내려놓아 보실래요? 무슨 이야기든 괜찮아요.";

    function App() {
      const [messages, setMessages] = useState([
        { role: 'assistant', content: GREETING }
      ]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const scrollRef = useRef(null);
      const textareaRef = useRef(null);

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [messages, loading]);

      const send = async () => {
        const text = input.trim();
        if (!text || loading) return;

        const nextMessages = [...messages, { role: 'user', content: text }];
        setMessages(nextMessages);
        setInput('');
        setError('');
        setLoading(true);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: nextMessages.map(m => ({ role: m.role, content: m.content }))
            })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || '응답을 받지 못했어요.');
          setMessages([...nextMessages, { role: 'assistant', content: data.text }]);
        } catch (e) {
          setError('기운이 닿지 않네요... ' + e.message);
        } finally {
          setLoading(false);
        }
      };

      const onKey = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      };

      const onInput = (e) => {
        setInput(e.target.value);
        const el = textareaRef.current;
        if (el) {
          el.style.height = 'auto';
          el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }
      };

      const reset = () => {
        setMessages([{ role: 'assistant', content: GREETING }]);
        setError('');
      };

      return (
        <div className="app">
          <div className="header">
            <h1>🌙 달빛 선녀</h1>
            <p>마음의 눈으로 당신의 이야기를 들어요</p>
            <button className="reset-btn" onClick={reset} title="대화 초기화">🔄</button>
          </div>

          <div className="messages" ref={scrollRef}>
            {messages.map((m, i) => (
              <div key={i} className={'msg ' + m.role}>
                <div className="bubble">{m.content}</div>
              </div>
            ))}
            {loading && (
              <div className="typing">
                <span>달빛 선녀가 마음을 읽고 있어요</span>
                <span className="dots">
                  <span className="dot"></span>
                  <span className="dot"></span>
                  <span className="dot"></span>
                </span>
              </div>
            )}
          </div>

          {error && <div className="error">{error}</div>}

          <div className="input-area">
            <textarea
              ref={textareaRef}
              rows={1}
              placeholder="마음속 이야기를 들려주세요..."
              value={input}
              onChange={onInput}
              onKeyDown={onKey}
              disabled={loading}
            />
            <button className="send-btn" onClick={send} disabled={loading || !input.trim()}>
              전하기
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏠 혼삶 주방</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #FFF8F0;
    --card: #FFFFFF;
    --primary: #FF8C42;
    --primary-soft: #FFD6B8;
    --text: #3D2F24;
    --muted: #8B7B6E;
    --border: #F2E4D4;
    --danger: #E14D4D;
    --warn-bg: #FFE8E0;
    --shadow: 0 2px 10px rgba(196, 134, 80, 0.08);
    --shadow-hover: 0 6px 20px rgba(196, 134, 80, 0.14);
    --radius: 18px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .app { max-width: 680px; margin: 0 auto; padding: 16px 16px 80px; }
  .header { text-align: center; padding: 24px 0 20px; }
  .header h1 { margin: 0; font-size: 28px; letter-spacing: -0.5px; }
  .header p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

  .tabs {
    display: flex; gap: 8px; background: var(--card);
    padding: 6px; border-radius: var(--radius); box-shadow: var(--shadow);
    margin-bottom: 20px; position: sticky; top: 8px; z-index: 10;
  }
  .tab {
    flex: 1; padding: 12px 8px; border: none; background: transparent;
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .tab.active { background: var(--primary); color: white; box-shadow: 0 2px 8px rgba(255,140,66,0.3); }
  .tab:not(.active):hover { background: var(--primary-soft); color: var(--text); }

  .card {
    background: var(--card); border-radius: var(--radius);
    padding: 18px; box-shadow: var(--shadow); margin-bottom: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover { box-shadow: var(--shadow-hover); }
  .card-title { margin: 0 0 4px; font-size: 17px; font-weight: 700; }
  .card-sub { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .card-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

  .btn {
    border: none; border-radius: var(--radius-sm); padding: 10px 18px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--primary-soft); color: white; cursor: not-allowed; transform: none; }
  .btn-ghost { background: var(--primary-soft); color: var(--text); }
  .btn-ghost:hover { background: #FFC39A; }
  .btn-danger { background: #fff; color: var(--danger); border: 1px solid var(--border); }
  .btn-danger:hover { background: var(--warn-bg); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-big {
    width: 100%; padding: 24px; font-size: 18px;
    background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 100%);
    color: white; border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(255, 140, 66, 0.25);
  }
  .btn-big:hover { filter: brightness(1.05); transform: translateY(-2px); box-shadow: 0 12px 28px rgba(255, 140, 66, 0.3); }
  .btn-big:disabled { background: var(--primary-soft); cursor: not-allowed; transform: none; box-shadow: var(--shadow); }

  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  }
  .badge-expiry { background: var(--warn-bg); color: var(--danger); }
  .badge-category { background: var(--primary-soft); color: var(--text); }
  .badge-version { background: #FFF0E0; color: var(--primary); border: 1px solid var(--primary-soft); }

  .tag {
    display: inline-block; padding: 4px 10px; margin: 2px;
    background: #F7EBDE; color: var(--text); border-radius: 999px;
    font-size: 12px;
  }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(60, 40, 20, 0.4);
    display: flex; align-items: center; justify-content: center;
    padding: 16px; z-index: 50;
  }
  .modal {
    background: var(--card); border-radius: var(--radius);
    padding: 24px; width: 100%; max-width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  }
  .modal h2 { margin: 0 0 16px; font-size: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .field input, .field select {
    width: 100%; padding: 11px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; background: #FDFAF6;
    color: var(--text); outline: none; transition: border 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--primary); }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .recipe-steps { white-space: pre-wrap; background: #FDF6EF; padding: 12px 14px; border-radius: var(--radius-sm); font-size: 14px; line-height: 1.8; }
  .recipe-tip { background: #FFF4E6; border-left: 3px solid var(--primary); padding: 10px 14px; border-radius: 8px; font-size: 13px; color: var(--text); margin-top: 10px; }

  .spinner {
    width: 42px; height: 42px; border: 4px solid var(--primary-soft);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 1s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-box { text-align: center; padding: 40px 20px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); }
  .loading-text { font-size: 15px; color: var(--muted); }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-emoji { font-size: 48px; display: block; margin-bottom: 10px; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-chip {
    padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; font-size: 13px; color: var(--muted);
    font-weight: 600;
  }
  .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .toolbar h3 { margin: 0; font-size: 16px; font-weight: 700; }

  .error-box {
    background: var(--warn-bg); color: var(--danger); padding: 12px 16px;
    border-radius: var(--radius-sm); margin-bottom: 14px; font-size: 13px;
  }

  .history-item { cursor: pointer; }
  .history-item .details { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); }

  a.notion-link { display: inline-block; margin-top: 10px; font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 600; }
  a.notion-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useCallback } = React;

const API = {
  listIngredients: () => fetch('/api/ingredients').then(r => r.json()),
  createIngredient: (data) => fetch('/api/ingredients', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(r => r.json()),
  updateIngredient: (id, data) => fetch(`/api/ingredients?id=${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(r => r.json()),
  deleteIngredient: (id) => fetch(`/api/ingredients?id=${id}`, { method: 'DELETE' }),
  generateRecipes: () => fetch('/api/recipe', { method: 'POST' }).then(async r => {
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Unknown error');
    return data;
  }),
  listRecipes: () => fetch('/api/recipe').then(r => r.json()),
};

function daysUntil(expiryDate) {
  if (!expiryDate) return null;
  const diff = new Date(expiryDate) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function App() {
  const [tab, setTab] = useState('fridge');
  return (
    <div className="app">
      <div className="header">
        <h1>🏠 혼삶 주방</h1>
        <p>냉장고 재료로 오늘의 한 끼, AI가 고민 대신 해드려요</p>
      </div>
      <div className="tabs">
        <button className={`tab ${tab==='fridge'?'active':''}`} onClick={() => setTab('fridge')}>🧊 냉장고</button>
        <button className={`tab ${tab==='recipe'?'active':''}`} onClick={() => setTab('recipe')}>🍳 레시피 만들기</button>
        <button className={`tab ${tab==='history'?'active':''}`} onClick={() => setTab('history')}>📚 히스토리</button>
      </div>
      {tab === 'fridge' && <FridgeTab />}
      {tab === 'recipe' && <RecipeTab />}
      {tab === 'history' && <HistoryTab />}
    </div>
  );
}

function FridgeTab() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const [editing, setEditing] = useState(null);

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try { setItems(await API.listIngredients()); }
    catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  const onDelete = async (id) => {
    if (!confirm('삭제할까요?')) return;
    await API.deleteIngredient(id);
    load();
  };

  return (
    <div>
      <div className="toolbar">
        <h3>냉장고 속 재료 ({items.length})</h3>
        <button className="btn btn-primary" onClick={() => { setEditing(null); setModalOpen(true); }}>+ 재료 추가</button>
      </div>
      {error && <div className="error-box">⚠️ {error}</div>}
      {loading ? <div className="loading-box"><div className="spinner"/><div className="loading-text">냉장고 여는 중...</div></div> :
        items.length === 0 ? (
          <div className="empty"><span className="empty-emoji">🥛</span>냉장고가 텅 비었네요. 재료를 추가해볼까요?</div>
        ) : items.map(it => {
          const days = daysUntil(it.expiry);
          const expiryLabel = days === null ? '' : days < 0 ? `${-days}일 지남` : days === 0 ? '오늘까지' : `${days}일 남음`;
          const warn = days !== null && days <= 3;
          return (
            <div key={it.id} className="card">
              <div className="card-row">
                <div style={{flex:1}}>
                  <div className="card-title">{it.name} <span style={{color:'var(--muted)',fontWeight:500}}>· {it.quantity}</span></div>
                  <div className="card-sub">
                    <span className="badge badge-category">{it.category || '냉장'}</span>
                    {' '}
                    {expiryLabel && <span className={`badge ${warn ? 'badge-expiry' : ''}`} style={!warn?{background:'#F3ECE3',color:'var(--muted)'}:{}}>
                      {warn ? '⚠️ ' : '📅 '}{expiryLabel}
                    </span>}
                    {it.allergen && <span className="badge badge-expiry" style={{marginLeft:4}}>알레르기</span>}
                  </div>
                </div>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn btn-ghost btn-sm" onClick={() => { setEditing(it); setModalOpen(true); }}>수정</button>
                  <button className="btn btn-danger btn-sm" onClick={() => onDelete(it.id)}>삭제</button>
                </div>
              </div>
            </div>
          );
        })
      }
      {modalOpen && (
        <IngredientModal
          initial={editing}
          onClose={() => setModalOpen(false)}
          onSaved={() => { setModalOpen(false); load(); }}
        />
      )}
    </div>
  );
}

function IngredientModal({ initial, onClose, onSaved }) {
  const [name, setName] = useState(initial?.name || '');
  const [quantity, setQuantity] = useState(initial?.quantity || '');
  const [category, setCategory] = useState(initial?.category || '냉장');
  const [expiry, setExpiry] = useState(initial?.expiry ? formatDate(initial.expiry) : '');
  const [allergen, setAllergen] = useState(initial?.allergen || false);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState(null);

  const submit = async (e) => {
    e.preventDefault();
    if (!name.trim()) return setErr('재료 이름은 필수예요');
    setSaving(true); setErr(null);
    try {
      const payload = { name, quantity, category, expiry: expiry || null, allergen };
      if (initial) await API.updateIngredient(initial.id, payload);
      else await API.createIngredient(payload);
      onSaved();
    } catch (e) { setErr(e.message); }
    finally { setSaving(false); }
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <form className="modal" onClick={e => e.stopPropagation()} onSubmit={submit}>
        <h2>{initial ? '재료 수정' : '새 재료 추가'}</h2>
        {err && <div className="error-box">{err}</div>}
        <div className="field">
          <label>이름 *</label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="예: 계란, 두부, 신김치" />
        </div>
        <div className="field-row">
          <div className="field">
            <label>수량</label>
            <input value={quantity} onChange={e => setQuantity(e.target.value)} placeholder="6개, 1모, 1/4포기" />
          </div>
          <div className="field">
            <label>카테고리</label>
            <select value={category} onChange={e => setCategory(e.target.value)}>
              <option value="냉장">냉장</option>
              <option value="냉동">냉동</option>
              <option value="실온">실온</option>
            </select>
          </div>
        </div>
        <div className="field-row">
          <div className="field">
            <label>유통기한</label>
            <input type="date" value={expiry} onChange={e => setExpiry(e.target.value)} />
          </div>
          <div className="field" style={{display:'flex',alignItems:'end'}}>
            <label style={{display:'flex',alignItems:'center',gap:6,marginBottom:11}}>
              <input type="checkbox" checked={allergen} onChange={e => setAllergen(e.target.checked)} />
              알레르기 유의
            </label>
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginTop:8}}>
          <button type="button" className="btn btn-ghost" onClick={onClose} style={{flex:1}}>취소</button>
          <button type="submit" className="btn btn-primary" disabled={saving} style={{flex:2}}>
            {saving ? '저장 중...' : (initial ? '수정' : '추가')}
          </button>
        </div>
      </form>
    </div>
  );
}

function RecipeTab() {
  const [loading, setLoading] = useState(false);
  const [recipes, setRecipes] = useState([]);
  const [error, setError] = useState(null);

  const generate = async () => {
    setLoading(true); setError(null); setRecipes([]);
    try {
      const data = await API.generateRecipes();
      setRecipes(data.recipes || []);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div>
      <button className="btn btn-big" onClick={generate} disabled={loading}>
        {loading ? '달빛 선녀가 고민 중이에요...' : '🍳 AI가 레시피 만들어줘!'}
      </button>
      {loading && (
        <div className="loading-box" style={{marginTop:16}}>
          <div className="spinner"/>
          <div className="loading-text">냉장고 털어서 3가지 레시피 짜는 중... (약 15초)</div>
        </div>
      )}
      {error && <div className="error-box" style={{marginTop:16}}>⚠️ {error}</div>}
      {recipes.length > 0 && (
        <div style={{marginTop:20}}>
          <h3 style={{margin:'0 0 14px'}}>🎉 오늘의 추천 레시피</h3>
          {recipes.map((r, i) => <RecipeCard key={r.id || i} recipe={r} rank={['🥇','🥈','🥉'][i]} />)}
        </div>
      )}
    </div>
  );
}

function RecipeCard({ recipe, rank }) {
  const ingredients = typeof recipe.ingredients === 'string'
    ? JSON.parse(recipe.ingredients) : (recipe.ingredients || []);
  const notionUrl = recipe.notion_page_id
    ? `https://notion.so/${recipe.notion_page_id.replace(/-/g, '')}`
    : null;
  return (
    <div className="card">
      <div className="card-title">{rank} {recipe.title} <span className="badge badge-version">{recipe.version}</span></div>
      <div className="card-sub">
        🔥 {recipe.calories}kcal · ⏱️ {recipe.cook_time}분 · {recipe.difficulty}
      </div>
      <div style={{marginBottom:10}}>
        {ingredients.map((ing, i) => (
          <span key={i} className="tag">{typeof ing === 'string' ? ing : ing.name}</span>
        ))}
      </div>
      <div className="recipe-steps">{recipe.steps}</div>
      {recipe.tip && <div className="recipe-tip">💡 {recipe.tip}</div>}
      {notionUrl && (
        <a className="notion-link" href={notionUrl} target="_blank" rel="noreferrer">
          📝 노션에서 보기 →
        </a>
      )}
    </div>
  );
}

function HistoryTab() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');
  const [expanded, setExpanded] = useState(null);

  useEffect(() => {
    (async () => {
      setLoading(true);
      try { setItems(await API.listRecipes()); }
      finally { setLoading(false); }
    })();
  }, []);

  const filtered = filter === 'all' ? items : items.filter(r => r.version === filter);

  return (
    <div>
      <div className="filter-bar">
        {['all','초간단','든든한','색다른'].map(f => (
          <button key={f}
            className={`filter-chip ${filter===f?'active':''}`}
            onClick={() => setFilter(f)}>
            {f === 'all' ? '전체' : f}
          </button>
        ))}
      </div>
      {loading ? <div className="loading-box"><div className="spinner"/><div className="loading-text">히스토리 불러오는 중...</div></div> :
        filtered.length === 0 ? (
          <div className="empty"><span className="empty-emoji">📜</span>저장된 레시피가 없어요. "레시피 만들기" 탭에서 첫 레시피를 생성해보세요!</div>
        ) : filtered.map(r => {
          const isOpen = expanded === r.id;
          const ingredients = typeof r.ingredients === 'string'
            ? JSON.parse(r.ingredients) : (r.ingredients || []);
          return (
            <div key={r.id} className="card history-item" onClick={() => setExpanded(isOpen ? null : r.id)}>
              <div className="card-row">
                <div style={{flex:1}}>
                  <div className="card-title">{r.title} <span className="badge badge-version">{r.version}</span></div>
                  <div className="card-sub">
                    📅 {formatDate(r.created_at)} · 🔥 {r.calories}kcal · ⏱️ {r.cook_time}분 · {r.difficulty}
                  </div>
                </div>
                <div style={{color:'var(--muted)',fontSize:18}}>{isOpen ? '▲' : '▼'}</div>
              </div>
              {isOpen && (
                <div className="details">
                  <div style={{marginBottom:10}}>
                    {ingredients.map((ing, i) => (
                      <span key={i} className="tag">{typeof ing === 'string' ? ing : ing.name}</span>
                    ))}
                  </div>
                  <div className="recipe-steps">{r.steps}</div>
                  {r.tip && <div className="recipe-tip">💡 {r.tip}</div>}
                  {r.notion_page_id && (
                    <a className="notion-link"
                       href={`https://notion.so/${r.notion_page_id.replace(/-/g, '')}`}
                       target="_blank" rel="noreferrer"
                       onClick={e => e.stopPropagation()}>
                      📝 노션에서 보기 →
                    </a>
                  )}
                </div>
              )}
            </div>
          );
        })
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#FAFAFA" />
<title>혼삶 · Solo Kitchen</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    /* Surfaces */
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --border: #E8E8E8;
    --border-strong: #A3A3A3;
    --hover: #F4F4F4;

    /* Text */
    --text: #0A0A0A;
    --text-2: #525252;
    --text-3: #A3A3A3;
    --text-disabled: #D4D4D4;

    /* Accents */
    --accent: #0A0A0A;
    --blue: #2563EB;
    --success: #16A34A;
    --danger: #DC2626;

    /* Status badges (low saturation) */
    --b-chill:        #E0E7FF;
    --b-chill-ink:    #3730A3;
    --b-room:         #FEF3C7;
    --b-room-ink:     #854D0E;
    --b-freeze:       #DBEAFE;
    --b-freeze-ink:   #1E40AF;
    --b-urgent:       #FEE2E2;
    --b-urgent-ink:   #991B1B;

    /* Version badges */
    --v-easy-bg:   #F4F4F4;   --v-easy-ink:   #0A0A0A;
    --v-hearty-bg: #E0E7FF;   --v-hearty-ink: #3730A3;
    --v-unique-bg: #F3E8FF;   --v-unique-ink: #6B21A8;

    /* Shadows (very restrained) */
    --shadow-hover:    0 1px 3px rgba(0,0,0,0.06);
    --shadow-floating: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-modal:    0 20px 40px rgba(0,0,0,0.12);

    /* Radii (sharp) */
    --r-card: 4px;
    --r-btn:  6px;
    --r-badge: 2px;
    --r-input: 4px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; letter-spacing: inherit; }
  input, select, textarea { font: inherit; color: inherit; letter-spacing: inherit; }
  a { color: inherit; text-decoration: none; }
  [data-lucide] { width: 16px; height: 16px; stroke-width: 1.75; display: inline-block; vertical-align: middle; }

  /* ============ LAYOUT ============ */
  .app { min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    display: flex; align-items: center;
    padding: 0 20px;
    gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar__brand {
    display: flex; align-items: center; gap: 10px;
    min-width: 220px;
  }
  .topbar__logo {
    width: 28px; height: 28px;
    background: var(--accent); color: #fff;
    display: grid; place-items: center;
    font-weight: 700; font-size: 13px;
    border-radius: var(--r-badge);
    letter-spacing: 0;
  }
  .topbar__name { font-weight: 600; font-size: 15px; letter-spacing: -0.02em; }
  .topbar__search {
    flex: 1; max-width: 420px;
    display: flex; align-items: center; gap: 8px;
    height: 36px; padding: 0 12px;
    background: var(--hover); border: 1px solid transparent;
    border-radius: var(--r-input);
    color: var(--text-3);
    transition: border-color 150ms, background 150ms;
  }
  .topbar__search:focus-within { background: var(--card); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); color: var(--text); }
  .topbar__search input { flex: 1; background: none; border: 0; outline: 0; font-size: 13px; color: var(--text); }
  .topbar__search input::placeholder { color: var(--text-3); }
  .topbar__spacer { flex: 1; }
  .topbar__profile {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--hover); color: var(--text-2);
    display: grid; place-items: center;
    font-size: 12px; font-weight: 600;
    border: 1px solid var(--border);
  }

  .body { display: flex; flex: 1; }

  .sidebar {
    width: 240px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--card);
    padding: 20px 12px;
    display: flex; flex-direction: column; gap: 2px;
    position: sticky; top: 112px;
    height: calc(100vh - 112px);
    overflow-y: auto;
  }
  .side-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3);
    padding: 12px 12px 6px;
  }
  .side-item {
    display: flex; align-items: center; gap: 10px;
    height: 36px; padding: 0 12px;
    border-radius: var(--r-input);
    font-size: 13px; font-weight: 500;
    color: var(--text-2);
    transition: background 120ms, color 120ms;
    width: 100%; text-align: left;
  }
  .side-item:hover { background: var(--hover); color: var(--text); }
  .side-item.is-active { background: var(--accent); color: #fff; }
  .side-item.is-active [data-lucide] { color: #fff; }

  .main { flex: 1; min-width: 0; }
  .main__inner { max-width: 960px; margin: 0 auto; padding: 40px 32px 80px; }

  /* Mobile tabs (top) */
  .mtabs { display: none; }

  /* ============ TYPOGRAPHY ============ */
  .display { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; }
  .title   { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; }
  .subtitle{ font-size: 16px; font-weight: 600; letter-spacing: -0.015em; }
  .body-s  { font-size: 13px; color: var(--text-2); }
  .caption { font-size: 12px; font-weight: 500; color: var(--text-2); }
  .tiny    { font-size: 11px; font-weight: 500; color: var(--text-3); }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); }
  .muted   { color: var(--text-2); }
  .mono-ink { color: var(--text); }

  /* ============ BUTTONS ============ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    height: 36px; padding: 0 14px;
    border-radius: var(--r-btn);
    font-size: 13px; font-weight: 500;
    border: 1px solid transparent;
    transition: all 150ms ease;
    white-space: nowrap;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn--primary { background: var(--accent); color: #fff; }
  .btn--primary:hover { background: #1a1a1a; }
  .btn--ghost { background: var(--card); color: var(--text); border-color: var(--border); }
  .btn--ghost:hover { border-color: var(--border-strong); }
  .btn--danger { background: var(--card); color: var(--danger); border-color: var(--border); }
  .btn--danger:hover { border-color: var(--danger); }
  .btn--lg { height: 48px; padding: 0 24px; font-size: 14px; font-weight: 600; min-width: 200px; }
  .btn--icon { width: 32px; height: 32px; padding: 0; border-radius: var(--r-input); color: var(--text-2); }
  .btn--icon:hover { background: var(--hover); color: var(--text); transform: none; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* ============ CHIPS / SEGMENTS ============ */
  .chips { display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 4px; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    height: 32px; padding: 0 12px;
    border-radius: var(--r-badge);
    border: 1px solid var(--border);
    background: var(--card); color: var(--text);
    font-size: 12px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 120ms;
  }
  .chip:hover { border-color: var(--border-strong); }
  .chip.is-active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip__count { color: var(--text-3); font-weight: 500; font-variant-numeric: tabular-nums; }
  .chip.is-active .chip__count { color: rgba(255,255,255,0.6); }

  .segment {
    display: inline-flex; padding: 3px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
  }
  .segment button {
    height: 30px; padding: 0 14px;
    font-size: 12px; font-weight: 500;
    color: var(--text-2);
    border-radius: var(--r-input);
    transition: all 150ms;
  }
  .segment button:hover { color: var(--text); }
  .segment button.is-active { background: var(--accent); color: #fff; }

  /* ============ BADGES ============ */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 22px; padding: 0 8px;
    border-radius: var(--r-badge);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.02em;
  }
  .badge--chill  { background: var(--b-chill);  color: var(--b-chill-ink); }
  .badge--room   { background: var(--b-room);   color: var(--b-room-ink); }
  .badge--freeze { background: var(--b-freeze); color: var(--b-freeze-ink); }
  .badge--urgent { background: var(--b-urgent); color: var(--b-urgent-ink); }
  .badge--plain  { background: var(--hover);    color: var(--text-2); }

  .vbadge {
    display: inline-flex; align-items: center;
    height: 22px; padding: 0 8px;
    border-radius: var(--r-badge);
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .vbadge--easy   { background: var(--v-easy-bg);   color: var(--v-easy-ink); }
  .vbadge--hearty { background: var(--v-hearty-bg); color: var(--v-hearty-ink); }
  .vbadge--unique { background: var(--v-unique-bg); color: var(--v-unique-ink); }

  .dday {
    font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums;
    color: var(--text-2);
  }
  .dday--warn   { color: #B45309; }
  .dday--danger { color: var(--danger); }
  .dday--past   { color: var(--text-3); text-decoration: line-through; }

  /* ============ CARD ============ */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    transition: border-color 150ms, box-shadow 150ms;
  }
  .card--interactive:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-hover);
  }
  .card__pad { padding: 20px; }

  /* ============ FRIDGE ============ */
  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; margin-bottom: 24px; min-height: 48px;
  }
  .page-head__title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .page-head__sub { margin-top: 4px; font-size: 12px; color: var(--text-2); }

  /* Desktop table */
  .table-wrap { border: 1px solid var(--border); border-radius: var(--r-card); background: var(--card); overflow: hidden; }
  .table { width: 100%; border-collapse: collapse; }
  .table thead th {
    height: 40px; padding: 0 16px;
    background: #FAFAFA;
    font-size: 12px; font-weight: 500;
    color: var(--text-2);
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .table tbody td {
    height: 52px; padding: 0 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    font-size: 13px;
  }
  .table tbody tr:last-child td { border-bottom: 0; }
  .table tbody tr { transition: background 120ms; }
  .table tbody tr:hover { background: var(--hover); }
  .table .cell--name { font-weight: 500; color: var(--text); }
  .table .cell--right { text-align: right; }
  .table .cell--actions { width: 56px; text-align: right; }
  .table .cell--muted { color: var(--text-2); font-variant-numeric: tabular-nums; }

  /* Mobile card list */
  .mlist { display: flex; flex-direction: column; gap: 8px; }
  .mrow {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 16px;
    display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
    align-items: center;
    transition: border-color 150ms;
  }
  .mrow:hover { border-color: var(--border-strong); }
  .mrow__name { font-size: 14px; font-weight: 500; }
  .mrow__meta { font-size: 12px; color: var(--text-2); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .mrow__right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  /* ============ RECIPE TAB ============ */
  .hero {
    text-align: center;
    padding: 56px 16px 40px;
  }
  .hero .eyebrow { margin-bottom: 14px; }
  .hero h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 12px; }
  .hero p  { font-size: 14px; color: var(--text-2); margin-bottom: 28px; }
  .hero__actions { display: inline-flex; gap: 8px; align-items: center; }

  /* Progress bar */
  .progress {
    position: relative;
    height: 4px; width: 100%;
    background: var(--border);
    border-radius: 0;
    overflow: hidden;
  }
  .progress__bar {
    position: absolute; top: 0; left: -30%;
    width: 30%; height: 100%;
    background: var(--accent);
    animation: progressSlide 1.2s ease-in-out infinite;
  }
  @keyframes progressSlide {
    0%   { left: -30%; }
    100% { left: 100%; }
  }

  .loading-line {
    max-width: 320px; margin: 0 auto;
    text-align: center;
  }
  .loading-line p { margin-top: 12px; font-size: 12px; color: var(--text-2); }

  /* Recipe grid */
  .rgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 32px; }
  .rcard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 24px;
    display: flex; flex-direction: column;
    transition: border-color 150ms;
  }
  .rcard:hover { border-color: var(--border-strong); }
  .rcard__head { margin-bottom: 16px; }
  .rcard__title {
    font-size: 18px; font-weight: 600; letter-spacing: -0.02em;
    margin: 10px 0 8px;
  }
  .rcard__meta {
    font-size: 12px; color: var(--text-2);
    display: flex; gap: 8px; align-items: center;
    font-variant-numeric: tabular-nums;
  }
  .rcard__meta-dot { color: var(--text-3); }
  .rcard__ingredients {
    margin-top: 14px;
    font-size: 13px; color: var(--text-2);
    line-height: 1.6;
  }
  .rcard__divider { height: 1px; background: var(--border); margin: 20px 0; }
  .rcard__section-label { font-size: 11px; font-weight: 500; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .rcard__steps { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
  .rcard__tip {
    margin-top: 16px; padding: 12px 14px;
    background: #FAFAFA;
    border: 1px solid var(--border);
    border-radius: var(--r-input);
    font-size: 12px; color: var(--text-2);
    display: flex; gap: 8px;
  }
  .rcard__tip [data-lucide] { flex-shrink: 0; color: var(--text-2); margin-top: 2px; }
  .rcard__link {
    margin-top: 18px;
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500;
    color: var(--text);
    transition: color 150ms;
    padding-top: 4px;
  }
  .rcard__link:hover { color: var(--blue); }

  /* ============ HISTORY ============ */
  .hist-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .hist-group { margin-bottom: 32px; }
  .hist-group__label {
    font-size: 13px; font-weight: 500; color: var(--text-2);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .hitem {
    min-height: 72px; padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
    align-items: center;
    transition: background 120ms;
    cursor: pointer;
  }
  .hitem:hover { background: var(--hover); }
  .hitem__top { display: flex; align-items: center; gap: 10px; }
  .hitem__title { font-size: 14px; font-weight: 500; }
  .hitem__meta { font-size: 12px; color: var(--text-2); font-variant-numeric: tabular-nums; }
  .hitem__time { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }

  /* ============ EMPTY ============ */
  .empty {
    padding: 64px 20px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: var(--r-card);
    background: var(--card);
  }
  .empty [data-lucide] { width: 24px; height: 24px; color: var(--text-3); margin-bottom: 12px; }
  .empty h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .empty p { font-size: 13px; color: var(--text-2); margin-bottom: 16px; }

  /* ============ MODAL ============ */
  .scrim {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,10,10,0.32);
    display: grid; place-items: center;
    padding: 20px;
    animation: fadeIn 150ms ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: 100%; max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-modal);
    overflow: hidden;
    animation: modalIn 180ms ease;
  }
  @keyframes modalIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal__head { padding: 20px 20px 4px; }
  .modal__title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .modal__sub { font-size: 12px; color: var(--text-2); margin-top: 4px; }
  .modal__body { padding: 16px 20px 20px; }
  .modal__foot {
    padding: 16px 20px;
    display: flex; justify-content: flex-end; gap: 8px;
    border-top: 1px solid var(--border);
    background: #FAFAFA;
  }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-2); }
  .field input, .field select {
    height: 36px; padding: 0 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-input);
    font-size: 13px; color: var(--text);
    outline: 0;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); }

  /* ============ TOAST ============ */
  .toasts {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: var(--accent); color: #fff;
    padding: 10px 16px;
    font-size: 13px; font-weight: 500;
    border-radius: var(--r-input);
    box-shadow: var(--shadow-floating);
    animation: toastUp 220ms ease;
    max-width: 90vw;
  }
  .toast--err { background: var(--danger); }
  @keyframes toastUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ============ TAB TRANSITION ============ */
  .tab-enter { animation: tabFade 200ms ease; }
  @keyframes tabFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ============ MENU ============ */
  .menu-wrap { position: relative; }
  .menu {
    position: absolute; right: 0; top: calc(100% + 4px);
    min-width: 140px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-modal);
    z-index: 20;
    padding: 4px;
  }
  .menu button {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 8px 10px;
    font-size: 13px; color: var(--text);
    border-radius: var(--r-input);
    text-align: left;
  }
  .menu button:hover { background: var(--hover); }
  .menu button.is-danger { color: var(--danger); }

  /* ============ MODE BAR (top segmented nav) ============ */
  .modebar {
    height: 48px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    display: flex; align-items: center; justify-content: center;
    padding: 0 20px;
    position: sticky; top: 64px; z-index: 45;
  }
  .modebar__seg {
    display: inline-flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    padding: 3px;
  }
  .modebar__seg button {
    height: 34px; padding: 0 20px;
    font-size: 13px; font-weight: 500;
    color: var(--text-2);
    border-radius: var(--r-input);
    transition: all 150ms;

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

/* ============ SESSION ============ */
const SID_KEY = 'honsam_sid';
function getSessionId() {
  let sid = null;
  try { sid = localStorage.getItem(SID_KEY); } catch (e) {}
  if (!sid) {
    sid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(36).slice(2));
    try { localStorage.setItem(SID_KEY, sid); } catch (e) {}
  }
  return sid;
}
function apiFetch(url, opts = {}) {
  const headers = { ...(opts.headers || {}), 'x-session-id': getSessionId() };
  return fetch(url, { ...opts, headers });
}

/* ============ API ============ */
const api = {
  listIngredients: () => fetch('/api/ingredients').then(r => r.json()),
  createIngredient: (data) => fetch('/api/ingredients', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(r => r.json()),
  updateIngredient: (id, data) => fetch('/api/ingredients?id=' + id, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(r => r.json()),
  deleteIngredient: (id) => fetch('/api/ingredients?id=' + id, { method: 'DELETE' }),
  generateRecipes: () => fetch('/api/recipe', { method: 'POST' }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'generate failed'); }
    return r.json();
  }),
  listRecipes: () => fetch('/api/recipe').then(r => r.json()),

  // Social (Q4)
  listPosts: (sort, category) => {
    const q = new URLSearchParams();
    if (sort) q.set('sort', sort);
    if (category && category !== '전체') q.set('category', category);
    return apiFetch('/api/posts?' + q.toString()).then(r => r.json());
  },
  createPost: (data) => apiFetch('/api/posts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'create failed'); }
    return r.json();
  }),
  bestPosts: () => apiFetch('/api/posts/best').then(r => r.json()),
  listComments: (postId) => apiFetch('/api/comments?post_id=' + postId).then(r => r.json()),
  createComment: (postId, content) => apiFetch('/api/comments', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ post_id: postId, content })
  }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'comment failed'); }
    return r.json();
  }),
  toggleReaction: (postId, type) => apiFetch('/api/reactions', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ post_id: postId, reaction_type: type })
  }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'reaction failed'); }
    return r.json();
  }),
};

/* ============ UTILS ============ */
function daysUntil(isoDate) {
  if (!isoDate) return null;
  const d = new Date(isoDate); const now = new Date();
  d.setHours(0,0,0,0); now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}
function ddayClass(n) {
  if (n == null) return '';
  if (n < 0) return 'dday--past';
  if (n <= 2) return 'dday--danger';
  if (n <= 5) return 'dday--warn';
  return '';
}
function ddayLabel(n) {
  if (n == null) return '';
  if (n < 0) return Math.abs(n) + '일 지남';
  if (n === 0) return 'D-DAY';
  return 'D-' + n;
}
function categoryBadgeClass(cat) {
  if (cat === '냉장') return 'badge--chill';
  if (cat === '실온') return 'badge--room';
  if (cat === '냉동') return 'badge--freeze';
  return 'badge--plain';
}
function versionClass(v) {
  if (v === '초간단') return 'vbadge--easy';
  if (v === '든든한') return 'vbadge--hearty';
  if (v === '색다른') return 'vbadge--unique';
  return 'vbadge--easy';
}
function versionAscii(v) {
  if (v === '초간단') return 'EASY';
  if (v === '든든한') return 'HEARTY';
  if (v === '색다른') return 'UNIQUE';
  return v;
}
function parseIngredients(raw) {
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'string') { try { return JSON.parse(raw); } catch { return [raw]; } }
  return [];
}
function notionUrl(pageId) {
  if (!pageId) return null;
  return 'https://www.notion.so/' + String(pageId).replace(/-/g, '');
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const h = String(d.getHours()).padStart(2,'0'); const m = String(d.getMinutes()).padStart(2,'0');
  return h + ':' + m;
}
function fmtDateHeader(iso) {
  const d = new Date(iso);
  const wk = ['일','월','화','수','목','금','토'][d.getDay()];
  return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 ' + wk + '요일';
}
function groupByDay(list) {
  const map = new Map();
  for (const item of list) {
    const key = (item.created_at || '').split('T')[0];
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  }
  return Array.from(map.entries()).sort((a, b) => (a[0] < b[0] ? 1 : -1));
}

/* ============ ICON ============ */
function Icon({ name, size, className, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (window.lucide && ref.current) {
      ref.current.setAttribute('data-lucide', name);
      ref.current.innerHTML = '';
      window.lucide.createIcons({ nameAttr: 'data-lucide', icons: window.lucide.icons, attrs: {}, elements: [ref.current] });
    }
  }, [name]);
  const style = size ? { width: size, height: size } : undefined;
  return <i ref={ref} data-lucide={name} className={className} style={style} {...rest} />;
}

function useLucide(dep) {
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [dep]);
}

/* ============ TOAST ============ */
const ToastCtx = createContext(null);
function ToastProvider({ children }) {
  const [items, setItems] = useState([]);
  const push = useCallback((msg, kind = 'ok') => {
    const id = Math.random().toString(36).slice(2);
    setItems(prev => [...prev, { id, msg, kind }]);
    setTimeout(() => setItems(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="toasts">
        {items.map(t => (
          <div key={t.id} className={'toast' + (t.kind === 'err' ? ' toast--err' : '')}>{t.msg}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

/* ============ LAYOUT ============ */
function TopBar({ tab }) {
  return (
    <header className="topbar">
      <div className="topbar__brand">
        <div className="topbar__logo">혼</div>
        <div className="topbar__name">혼삶</div>
      </div>
      <div className="topbar__search">
        <Icon name="search" size={14} />
        <input placeholder="재료, 레시피 검색…" />
      </div>
      <div className="topbar__spacer" />
      <div className="topbar__profile">MK</div>
    </header>
  );
}

const SIDEBAR_ITEMS = {
  food: [
    { id: 'fridge',  icon: 'refrigerator',   label: '냉장고' },
    { id: 'recipe',  icon: 'chef-hat',       label: '만들기' },
    { id: 'history', icon: 'history',        label: '기록' },
  ],
  social: [
    { id: 'talk',  icon: 'message-circle', label: '혼삶톡' },
    { id: 'best',  icon: 'trophy',         label: '베스트' },
    { id: 'write', icon: 'pencil-line',    label: '쓰기' },
  ],
};

function Sidebar({ mode, tab, setTab }) {
  useLucide(mode + ':' + tab);
  const items = SIDEBAR_ITEMS[mode] || SIDEBAR_ITEMS.food;
  const label = mode === 'social' ? 'Social' : 'Workspace';
  return (
    <aside className="sidebar">
      <div className="side-label">{label}</div>
      {items.map(it => (
        <button key={it.id}
          className={'side-item' + (tab === it.id ? ' is-active' : '')}
          onClick={() => setTab(it.id)}>
          <Icon name={it.icon} />
          <span>{it.label}</span>
        </button>
      ))}
    </aside>
  );
}

function MobileTabs({ mode, tab, setTab }) {
  const items = (SIDEBAR_ITEMS[mode] || SIDEBAR_ITEMS.food).map(it => ({ id: it.id, label: it.label }));
  return (
    <nav className="mtabs">
      {items.map(it => (
        <button key={it.id}
          className={tab === it.id ? 'is-active' : ''}
          onClick={() => setTab(it.id)}>{it.label}</button>
      ))}
    </nav>
  );
}

function ModeBar({ mode, setMode }) {
  return (
    <div className="modebar">
      <div className="modebar__seg">
        <button className={mode === 'food' ? 'is-active' : ''} onClick={() => setMode('food')}>🍳 식생활</button>
        <button className={mode === 'social' ? 'is-active' : ''} onClick={() => setMode('social')}>💬 소셜</button>
      </div>
    </div>
  );
}

/* ============ FRIDGE ============ */
function FridgeTab() {
  const toast = useToast();
  const [list, setList] = useState(null);
  const [filter, setFilter] = useState('all');
  const [modal, setModal] = useState(null); // {mode:'add'} | {mode:'edit', item}
  const [confirm, setConfirm] = useState(null);
  const [menuId, setMenuId] = useState(null);

  const load = useCallback(async () => {
    try { setList(await api.listIngredients()); }
    catch (e) { toast('재료를 불러오지 못했어요', 'err'); setList([]); }
  }, [toast]);

  useEffect(() => { load(); }, [load]);
  useLucide(list);

  useEffect(() => {
    const close = () => setMenuId(null);
    if (menuId) { window.addEventListener('click', close); return () => window.removeEventListener('click', close); }
  }, [menuId]);

  const counts = useMemo(() => {
    const src = list || [];
    const urgent = src.filter(x => { const d = daysUntil(x.expiry); return d != null && d <= 3; }).length;
    return {
      all:    src.length,
      chill:  src.filter(x => x.category === '냉장').length,
      room:   src.filter(x => x.category === '실온').length,
      freeze: src.filter(x => x.category === '냉동').length,
      urgent,
    };
  }, [list]);

  const filtered = useMemo(() => {
    if (!list) return [];
    if (filter === 'all') return list;
    if (filter === 'urgent') return list.filter(x => { const d = daysUntil(x.expiry); return d != null && d <= 3; });
    const map = { chill: '냉장', room: '실온', freeze: '냉동' };
    return list.filter(x => x.category === map[filter]);
  }, [list, filter]);

  async function onSave(data) {
    try {
      if (modal.mode === 'add') { await api.createIngredient(data); toast('재료를 추가했어요'); }
      else { await api.updateIngredient(modal.item.id, data); toast('재료를 수정했어요'); }
      setModal(null); load();
    } catch (e) { toast('저장에 실패했어요', 'err'); }
  }
  async function onDelete() {
    try { await api.deleteIngredient(confirm.id); toast('삭제했어요'); setConfirm(null); load(); }
    catch (e) { toast('삭제에 실패했어요', 'err'); }
  }

  if (list === null) return (

/* ============ SOCIAL: CONSTANTS + HELPERS ============ */
const CATEGORIES = ['고민','칭찬','응원','수다'];
const CATEGORY_FILTERS = ['전체', ...CATEGORIES];
const CATEGORY_META = {
  '고민': { cls: 'cbadge--gomin',     desc: '이야기하고 풀기' },
  '칭찬': { cls: 'cbadge--chingchan', desc: '잘한 나를 자랑' },
  '응원': { cls: 'cbadge--eungwon',   desc: '힘내라는 한마디' },
  '수다': { cls: 'cbadge--suda',      desc: '편하게 수다' },
};
const REACTION_META = [
  { type: 'like',    emoji: '💙', label: '공감', key: 'like_count' },
  { type: 'cheer',   emoji: '🤗', label: '응원', key: 'cheer_count' },
  { type: 'sparkle', emoji: '✨', label: '칭찬', key: 'sparkle_count' },
];
const ANIMALS_CLIENT = ['고양이','강아지','부엉이','여우','햄스터','판다','토끼','다람쥐','펭귄','코알라'];
const ADJS_CLIENT    = ['지친','뿌듯한','다정한','감성','배고픈','씩씩한','조용한','엉뚱한','따뜻한','귀여운'];

function previewNickname() {
  const a  = ADJS_CLIENT[Math.floor(Math.random() * ADJS_CLIENT.length)];
  const an = ANIMALS_CLIENT[Math.floor(Math.random() * ANIMALS_CLIENT.length)];
  const n  = Math.floor(Math.random() * 9999) + 1;
  return a + ' ' + an + ' #' + n;
}

function timeAgo(iso) {
  if (!iso) return '';
  const t = new Date(iso);
  const diffMin = Math.floor((Date.now() - t.getTime()) / 60000);
  if (diffMin < 1) return '방금';
  if (diffMin < 60) return diffMin + '분 전';
  const diffH = Math.floor(diffMin / 60);
  if (diffH < 24) return diffH + '시간 전';
  const diffD = Math.floor(diffH / 24);
  if (diffD < 7) return diffD + '일 전';
  return (t.getMonth() + 1) + '/' + t.getDate();
}

function parseTags(raw) {
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'string') { try { const v = JSON.parse(raw); return Array.isArray(v) ? v : []; } catch { return []; } }
  return [];
}

function applyToggleLocal(post, type) {
  const key = type === 'like' ? 'like_count' : type === 'cheer' ? 'cheer_count' : 'sparkle_count';
  const my = Array.isArray(post.my_reactions) ? [...post.my_reactions] : [];
  const has = my.includes(type);
  const newMy = has ? my.filter(t => t !== type) : [...my, type];
  const newCount = Math.max(0, (post[key] ?? 0) + (has ? -1 : 1));
  return { ...post, my_reactions: newMy, [key]: newCount };
}

        <div className="modal__head">
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span className={'cbadge ' + meta.cls}>{post.category}</span>
            <span className="pcard__nick">{post.nickname}</span>
            <span className="pcard__time" style={{ marginLeft: 'auto' }}>{timeAgo(post.created_at)}</span>
          </div>
        </div>
        <div className="modal__body" style={{ overflowY: 'auto', flex: 1 }}>
          <div className="pdetail__body">{post.content}</div>
          {tags.length > 0 && (
            <div className="pcard__tags" style={{ marginTop: 14 }}>
              {tags.map((t, i) => <span key={i} className="tag-pill">#{t}</span>)}
            </div>
          )}
          <div style={{ marginTop: 16 }}>
            <ReactionBar post={post} onToggle={onToggle} />
          </div>

          <div className="pdetail__divider" />

          <div className="rcard__section-label">답글 {comments ? comments.length + '개' : ''}</div>
          {comments === null ? (
            <div className="progress" style={{ marginTop: 10 }}><div className="progress__bar"/></div>
          ) : comments.length === 0 ? (
            <div className="comments__empty">아직 답글이 없어요. 가장 먼저 남겨보세요.</div>
          ) : (
            <div>
              {comments.map(c => (
                <div key={c.id} className="comment">
                  <div className="comment__head">
                    <span className="comment__nick">{c.nickname}</span>
                    <span className="comment__time">{timeAgo(c.created_at)}</span>
                  </div>
                  <div className="comment__body">{c.content}</div>
                </div>
              ))}
              <div ref={listEndRef} />
            </div>
          )}

          <form className="reply-form" onSubmit={submit}>
            <input
              value={reply}
              onChange={e => setReply(e.target.value)}
              placeholder="답글을 남겨보세요 (익명)"
              maxLength={300}
            />
            <button type="submit" className="btn btn--primary" disabled={busy || !reply.trim()}>
              {busy ? '전송 중…' : '답글'}
            </button>
          </form>
        </div>
        <div className="modal__foot">
          <button className="btn btn--ghost" onClick={onClose}>닫기</button>
        </div>
      </div>
    </div>
  );
}

/* ============ SOCIAL: TALK LIST ============ */
function SocialTalkTab() {
  const toast = useToast();
  const [list, setList] = useState(null);
  const [category, setCategory] = useState('전체');
  const [sort, setSort] = useState('latest');
  const [detail, setDetail] = useState(null);

  const load = useCallback(async () => {
    try { setList(await api.listPosts(sort, category)); }
    catch { toast('게시글을 불러오지 못했어요', 'err'); setList([]); }
  }, [sort, category, toast]);

  useEffect(() => { load(); }, [load]);

  async function handleToggle(postId, type) {
    const beforeList = list;
    const beforeDetail = detail;
    setList(prev => prev ? prev.map(p => p.id === postId ? applyToggleLocal(p, type) : p) : prev);
    setDetail(d => (d && d.id === postId ? applyToggleLocal(d, type) : d));
    try {
      const res = await api.toggleReaction(postId, type);
      setList(prev => prev ? prev.map(p => p.id === postId ? { ...p, ...res.post } : p) : prev);
      setDetail(d => (d && d.id === postId ? { ...d, ...res.post } : d));
    } catch {
      setList(beforeList);
      setDetail(beforeDetail);
      toast('반응 처리 실패', 'err');
    }
  }

  if (list === null) return (
    <div className="tab-enter">
      <div className="page-head"><div><div className="page-head__title">혼삶톡</div><div className="page-head__sub">불러오는 중…</div></div></div>
      <div className="progress"><div className="progress__bar"/></div>
    </div>
  );

  return (
    <div className="tab-enter">
      <div className="page-head">
        <div>
          <div className="page-head__title">혼삶톡</div>
          <div className="page-head__sub">익명으로 나누는 혼삶 이야기</div>
        </div>
        <div className="segment">
          <button className={sort === 'latest' ? 'is-active' : ''} onClick={() => setSort('latest')}>최신순</button>
          <button className={sort === 'popular' ? 'is-active' : ''} onClick={() => setSort('popular')}>인기순</button>
        </div>
      </div>

      <div className="chips" style={{ marginBottom: 20 }}>
        {CATEGORY_FILTERS.map(c => (
          <button key={c}
            className={'chip' + (category === c ? ' is-active' : '')}
            onClick={() => setCategory(c)}>{c}</button>
        ))}
      </div>

      {list.length === 0 ? (
        <EmptyState icon="message-circle" title="아직 글이 없어요" desc="첫 글을 남겨 보세요. 익명으로 편하게 쓸 수 있어요" />
      ) : (
        <div className="plist">
          {list.map(p => (
            <PostCard key={p.id} post={p} onClick={() => setDetail(p)} />
          ))}
        </div>
      )}

      {detail && (
        <PostDetailModal
          post={detail}
          onClose={() => setDetail(null)}
          onToggle={(type) => handleToggle(detail.id, type)}
        />
      )}
    </div>
  );
}

/* ============ SOCIAL: WRITE ============ */
function SocialWriteTab({ goToTalk }) {
  const toast = useToast();
  const [category, setCategory] = useState('수다');
  const [content, setContent] = useState('');
  const [tags, setTags] = useState([]);
  const [tagInput, setTagInput] = useState('');
  const [preview, setPreview] = useState(() => previewNickname());
  const [busy, setBusy] = useState(false);

  function addTag() {
    const v = tagInput.trim().replace(/^#/, '');
    if (!v) return;
    if (tags.length >= 5) { toast('태그는 최대 5개예요', 'err'); return; }
    if (tags.includes(v)) { setTagInput(''); return; }
    setTags([...tags, v]);
    setTagInput('');
  }
  function onTagKey(e) {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(); }
    else if (e.key === 'Backspace' && tagInput === '' && tags.length > 0) { setTags(tags.slice(0, -1)); }
  }

  async function submit(e) {
    e.preventDefault();
    if (!content.trim()) { toast('본문을 입력해주세요', 'err'); return; }
    if (content.length > 500) { toast('500자를 넘을 수 없어요', 'err'); return; }
    setBusy(true);
    try {
      await api.createPost({ category, content: content.trim(), tags });
      toast('익명으로 게시되었어요');
      setContent(''); setTags([]); setTagInput(''); setPreview(previewNickname());
      goToTalk?.();
    } catch (err) {
      toast(err.message || '게시 실패', 'err');
    } finally { setBusy(false); }
  }

  const over = content.length > 500;

  return (
    <div className="tab-enter">
      <div className="page-head">
        <div>
          <div className="page-head__title">쓰기</div>
          <div className="page-head__sub">닉네임은 서버에서 랜덤으로 정해져요</div>
        </div>
      </div>

      <form className="write-form" onSubmit={submit}>
        <div>
          <label className="write-label">카테고리</label>
          <div className="radio-row">
            {CATEGORIES.map(c => (
              <button type="button" key={c}
                className={'radio-cell' + (category === c ? ' is-active' : '')}
                onClick={() => setCategory(c)}>
                <div className="radio-cell__label">{c}</div>
                <div className="radio-cell__desc">{CATEGORY_META[c]?.desc}</div>
              </button>
            ))}
          </div>
        </div>

        <div>
          <label className="write-label">본문</label>
          <textarea
            className="write-textarea"
            value={content}
            onChange={e => setContent(e.target.value)}
            placeholder="편하게 하고 싶은 이야기를 남겨 보세요 (최대 500자)"
          />
          <div className={'write-counter' + (over ? ' is-over' : '')}>{content.length} / 500</div>
        </div>

        <div>
          <label className="write-label">태그 (선택 · 최대 5개)</label>
          <div className="tag-row">
            {tags.map((t, i) => (
              <span key={i} className="tag-pill tag-pill--remove" onClick={() => setTags(tags.filter((_, j) => j !== i))}>
                #{t}
              </span>
            ))}
            <input
              value={tagInput}
              onChange={e => setTagInput(e.target.value)}
              onKeyDown={onTagKey}
              placeholder={tags.length >= 5 ? '태그 5개가 꽉 찼어요' : '엔터로 태그 추가'}
              maxLength={20}
              disabled={tags.length >= 5}
            />
          </div>
        </div>

        <div className="nickname-preview">
          당신은 이번에 <strong>{preview}</strong> 로 게시됩니다. <br />
          실제 닉네임은 게시 순간 서버에서 다시 뽑혀요.
        </div>

        <button type="submit" className="btn btn--primary btn--lg" style={{ width: '100%', minWidth: 0 }} disabled={busy || over || !content.trim()}>
          {busy ? '게시 중…' : '익명으로 게시하기'}
        </button>
      </form>
    </div>
  );
}

/* ============ APP ============ */
function App() {
  const [mode, setMode] = useState('food');
  const [foodTab, setFoodTab] = useState('fridge');
  const [socialTab, setSocialTab] = useState('talk');
  const tab = mode === 'food' ? foodTab : socialTab;
  const setTab = mode === 'food' ? setFoodTab : setSocialTab;
  useLucide(mode + ':' + tab);
  return (
    <ToastProvider>
      <div className="app">
        <TopBar />
        <ModeBar mode={mode} setMode={setMode} />
        <MobileTabs mode={mode} tab={tab} setTab={setTab} />
        <div className="body">
          <Sidebar mode={mode} tab={tab} setTab={setTab} />
          <main className="main">
            <div className="main__inner">
              {mode === 'food'   && tab === 'fridge'  && <FridgeTab key="fridge" />}
              {mode === 'food'   && tab === 'recipe'  && <RecipeTab key="recipe" />}
              {mode === 'food'   && tab === 'history' && <HistoryTab key="history" />}
              {mode === 'social' && tab === 'talk'    && <SocialTalkTab key="talk" />}
              {mode === 'social' && tab === 'best'    && <SocialBestTab key="best" />}
              {mode === 'social' && tab === 'write'   && <SocialWriteTab key="write" goToTalk={() => setSocialTab('talk')} />}
            </div>
          </main>
        </div>
      </div>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

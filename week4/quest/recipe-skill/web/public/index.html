<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
<meta name="theme-color" content="#FAFAFA" />
<title>혼자사는 삶 (Honsam)</title>
<meta name="description" content="도시 1인 가구를 위한 AI 올인원 플랫폼 — 냉장고, 레시피, 익명 소통, 밸런스 게임, 연봉/지출, 운세." />
<meta property="og:title" content="혼자사는 삶" />
<meta property="og:description" content="도시 1인 가구를 위한 AI 올인원 플랫폼" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    /* Surfaces */
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --border: #E8E8E8;
    --border-strong: #A3A3A3;
    --hover: #F4F4F4;

    /* Text */
    --text: #0A0A0A;
    --text-2: #525252;
    --text-3: #A3A3A3;
    --text-disabled: #D4D4D4;

    /* Accents */
    --accent: #0A0A0A;
    --blue: #2563EB;
    --success: #16A34A;
    --danger: #DC2626;

    /* Status badges (low saturation) */
    --b-chill:        #E0E7FF;
    --b-chill-ink:    #3730A3;
    --b-room:         #FEF3C7;
    --b-room-ink:     #854D0E;
    --b-freeze:       #DBEAFE;
    --b-freeze-ink:   #1E40AF;
    --b-urgent:       #FEE2E2;
    --b-urgent-ink:   #991B1B;

    /* Version badges */
    --v-easy-bg:   #F4F4F4;   --v-easy-ink:   #0A0A0A;
    --v-hearty-bg: #E0E7FF;   --v-hearty-ink: #3730A3;
    --v-unique-bg: #F3E8FF;   --v-unique-ink: #6B21A8;

    /* Shadows (very restrained) */
    --shadow-hover:    0 1px 3px rgba(0,0,0,0.06);
    --shadow-floating: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-modal:    0 20px 40px rgba(0,0,0,0.12);

    /* Radii (sharp) */
    --r-card: 4px;
    --r-btn:  6px;
    --r-badge: 2px;
    --r-input: 4px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; letter-spacing: inherit; }
  input, select, textarea { font: inherit; color: inherit; letter-spacing: inherit; }
  a { color: inherit; text-decoration: none; }
  [data-lucide] { width: 16px; height: 16px; stroke-width: 1.75; display: inline-block; vertical-align: middle; }

  /* ============ LAYOUT ============ */
  .app { min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    height: 64px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    display: flex; align-items: center;
    padding: 0 20px;
    gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar__brand {
    display: flex; align-items: center; gap: 10px;
    min-width: 220px;
  }
  .topbar__logo {
    width: 28px; height: 28px;
    background: var(--accent); color: #fff;
    display: grid; place-items: center;
    font-weight: 700; font-size: 13px;
    border-radius: var(--r-badge);
    letter-spacing: 0;
  }
  .topbar__name {
    font-weight: 300; font-size: 18px; letter-spacing: -0.02em;
    display: inline-flex; align-items: center; gap: 4px;
    white-space: nowrap;
    color: var(--text);
  }
  .topbar__name__accent {
    display: inline-block;
    background: #A41E22; /* 진한 인주색 */
    color: #fff;
    padding: 2px 8px;
    border-radius: 2px;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0;
    line-height: 1.1;
  }
  .topbar__search {
    flex: 1; max-width: 420px;
    display: flex; align-items: center; gap: 8px;
    height: 36px; padding: 0 12px;
    background: var(--hover); border: 1px solid transparent;
    border-radius: var(--r-input);
    color: var(--text-3);
    transition: border-color 150ms, background 150ms;
  }
  .topbar__search:focus-within { background: var(--card); border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); color: var(--text); }
  .topbar__search input { flex: 1; background: none; border: 0; outline: 0; font-size: 13px; color: var(--text); }
  .topbar__search input::placeholder { color: var(--text-3); }
  .topbar__spacer { flex: 1; }

  .body { display: flex; flex: 1; }

  .sidebar {
    width: 240px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--card);
    padding: 20px 12px;
    display: flex; flex-direction: column; gap: 2px;
    position: sticky; top: 112px;
    height: calc(100vh - 112px);
    overflow-y: auto;
  }
  .side-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3);
    padding: 12px 12px 6px;
  }
  .side-item {
    display: flex; align-items: center; gap: 10px;
    height: 36px; padding: 0 12px;
    border-radius: var(--r-input);
    font-size: 13px; font-weight: 500;
    color: var(--text-2);
    transition: background 120ms, color 120ms;
    width: 100%; text-align: left;
  }
  .side-item:hover { background: var(--hover); color: var(--text); }
  .side-item.is-active { background: var(--accent); color: #fff; }
  .side-item.is-active [data-lucide] { color: #fff; }

  .main { flex: 1; min-width: 0; }
  .main__inner { max-width: 960px; margin: 0 auto; padding: 40px 32px 80px; }

  /* Mobile tabs (top) */
  .mtabs { display: none; }

  /* ============ TYPOGRAPHY ============ */
  .display { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; }
  .title   { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; }
  .subtitle{ font-size: 16px; font-weight: 600; letter-spacing: -0.015em; }
  .body-s  { font-size: 13px; color: var(--text-2); }
  .caption { font-size: 12px; font-weight: 500; color: var(--text-2); }
  .tiny    { font-size: 11px; font-weight: 500; color: var(--text-3); }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); }
  .muted   { color: var(--text-2); }
  .mono-ink { color: var(--text); }

  /* ============ BUTTONS ============ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    height: 36px; padding: 0 14px;
    border-radius: var(--r-btn);
    font-size: 13px; font-weight: 500;
    border: 1px solid transparent;
    transition: all 150ms ease;
    white-space: nowrap;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn--primary { background: var(--accent); color: #fff; }
  .btn--primary:hover { background: #1a1a1a; }
  .btn--ghost { background: var(--card); color: var(--text); border-color: var(--border); }
  .btn--ghost:hover { border-color: var(--border-strong); }
  .btn--danger { background: var(--card); color: var(--danger); border-color: var(--border); }
  .btn--danger:hover { border-color: var(--danger); }
  .btn--lg { height: 48px; padding: 0 24px; font-size: 14px; font-weight: 600; min-width: 200px; }
  .btn--icon { width: 32px; height: 32px; padding: 0; border-radius: var(--r-input); color: var(--text-2); }
  .btn--icon:hover { background: var(--hover); color: var(--text); transform: none; }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* ============ CHIPS / SEGMENTS ============ */
  .chips { display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 4px; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    height: 32px; padding: 0 12px;
    border-radius: var(--r-badge);
    border: 1px solid var(--border);
    background: var(--card); color: var(--text);
    font-size: 12px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 120ms;
  }
  .chip:hover { border-color: var(--border-strong); }
  .chip.is-active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip__count { color: var(--text-3); font-weight: 500; font-variant-numeric: tabular-nums; }
  .chip.is-active .chip__count { color: rgba(255,255,255,0.6); }

  .segment {
    display: inline-flex; padding: 3px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
  }
  .segment button {
    height: 30px; padding: 0 14px;
    font-size: 12px; font-weight: 500;
    color: var(--text-2);
    border-radius: var(--r-input);
    transition: all 150ms;
  }
  .segment button:hover { color: var(--text); }
  .segment button.is-active { background: var(--accent); color: #fff; }

  /* ============ BADGES ============ */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 22px; padding: 0 8px;
    border-radius: var(--r-badge);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.02em;
  }
  .badge--chill  { background: var(--b-chill);  color: var(--b-chill-ink); }
  .badge--room   { background: var(--b-room);   color: var(--b-room-ink); }
  .badge--freeze { background: var(--b-freeze); color: var(--b-freeze-ink); }
  .badge--urgent { background: var(--b-urgent); color: var(--b-urgent-ink); }
  .badge--plain  { background: var(--hover);    color: var(--text-2); }

  .vbadge {
    display: inline-flex; align-items: center;
    height: 22px; padding: 0 8px;
    border-radius: var(--r-badge);
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .vbadge--easy   { background: var(--v-easy-bg);   color: var(--v-easy-ink); }
  .vbadge--hearty { background: var(--v-hearty-bg); color: var(--v-hearty-ink); }
  .vbadge--unique { background: var(--v-unique-bg); color: var(--v-unique-ink); }

  .dday {
    font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums;
    color: var(--text-2);
  }
  .dday--warn   { color: #B45309; }
  .dday--danger { color: var(--danger); }
  .dday--past   { color: var(--text-3); text-decoration: line-through; }

  /* ============ CARD ============ */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    transition: border-color 150ms, box-shadow 150ms;
  }
  .card--interactive:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-hover);
  }
  .card__pad { padding: 20px; }

  /* ============ FRIDGE ============ */
  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; margin-bottom: 24px; min-height: 48px;
  }
  .page-head__title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .page-head__sub { margin-top: 4px; font-size: 12px; color: var(--text-2); }

  /* Desktop table */
  .table-wrap { border: 1px solid var(--border); border-radius: var(--r-card); background: var(--card); overflow: hidden; }
  .table { width: 100%; border-collapse: collapse; }
  .table thead th {
    height: 40px; padding: 0 16px;
    background: #FAFAFA;
    font-size: 12px; font-weight: 500;
    color: var(--text-2);
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .table tbody td {
    height: 52px; padding: 0 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    font-size: 13px;
  }
  .table tbody tr:last-child td { border-bottom: 0; }
  .table tbody tr { transition: background 120ms; }
  .table tbody tr:hover { background: var(--hover); }
  .table .cell--name { font-weight: 500; color: var(--text); }
  .table .cell--right { text-align: right; }
  .table .cell--actions { width: 56px; text-align: right; }
  .table .cell--muted { color: var(--text-2); font-variant-numeric: tabular-nums; }

  /* Mobile card list */
  .mlist { display: flex; flex-direction: column; gap: 8px; }
  .mrow {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 16px;
    display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
    align-items: center;
    transition: border-color 150ms;
  }
  .mrow:hover { border-color: var(--border-strong); }
  .mrow__name { font-size: 14px; font-weight: 500; }
  .mrow__meta { font-size: 12px; color: var(--text-2); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .mrow__right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  /* ============ RECIPE TAB ============ */
  .hero {
    text-align: center;
    padding: 56px 16px 40px;
  }
  .hero .eyebrow { margin-bottom: 14px; }
  .hero h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 12px; }
  .hero p  { font-size: 14px; color: var(--text-2); margin-bottom: 28px; }
  .hero__actions { display: inline-flex; gap: 8px; align-items: center; }

  /* Progress bar */
  .progress {
    position: relative;
    height: 4px; width: 100%;
    background: var(--border);
    border-radius: 0;
    overflow: hidden;
  }
  .progress__bar {
    position: absolute; top: 0; left: -30%;
    width: 30%; height: 100%;
    background: var(--accent);
    animation: progressSlide 1.2s ease-in-out infinite;
  }
  @keyframes progressSlide {
    0%   { left: -30%; }
    100% { left: 100%; }
  }

  .loading-line {
    max-width: 320px; margin: 0 auto;
    text-align: center;
  }
  .loading-line p { margin-top: 12px; font-size: 12px; color: var(--text-2); }

  /* Recipe grid */
  .rgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 32px; }
  .rcard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 24px;
    display: flex; flex-direction: column;
    transition: border-color 150ms;
  }
  .rcard:hover { border-color: var(--border-strong); }
  .rcard__head { margin-bottom: 16px; }
  .rcard__title {
    font-size: 18px; font-weight: 600; letter-spacing: -0.02em;
    margin: 10px 0 8px;
  }
  .rcard__meta {
    font-size: 12px; color: var(--text-2);
    display: flex; gap: 8px; align-items: center;
    font-variant-numeric: tabular-nums;
  }
  .rcard__meta-dot { color: var(--text-3); }
  .rcard__ingredients {
    margin-top: 14px;
    font-size: 13px; color: var(--text-2);
    line-height: 1.6;
  }
  .rcard__divider { height: 1px; background: var(--border); margin: 20px 0; }
  .rcard__section-label { font-size: 11px; font-weight: 500; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .rcard__steps { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
  .rcard__tip {
    margin-top: 16px; padding: 12px 14px;
    background: #FAFAFA;
    border: 1px solid var(--border);
    border-radius: var(--r-input);
    font-size: 12px; color: var(--text-2);
    display: flex; gap: 8px;
  }
  .rcard__tip [data-lucide] { flex-shrink: 0; color: var(--text-2); margin-top: 2px; }
  .rcard__link {
    margin-top: 18px;
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500;
    color: var(--text);
    transition: color 150ms;
    padding-top: 4px;
  }
  .rcard__link:hover { color: var(--blue); }

  /* ============ HISTORY ============ */
  .hist-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .hist-group { margin-bottom: 32px; }
  .hist-group__label {
    font-size: 13px; font-weight: 500; color: var(--text-2);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .hitem {
    min-height: 72px; padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
    align-items: center;
    transition: background 120ms;
    cursor: pointer;
  }
  .hitem:hover { background: var(--hover); }
  .hitem__top { display: flex; align-items: center; gap: 10px; }
  .hitem__title { font-size: 14px; font-weight: 500; }
  .hitem__meta { font-size: 12px; color: var(--text-2); font-variant-numeric: tabular-nums; }
  .hitem__time { font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }

  /* ============ EMPTY ============ */
  .empty {
    padding: 64px 20px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: var(--r-card);
    background: var(--card);
  }
  .empty [data-lucide] { width: 24px; height: 24px; color: var(--text-3); margin-bottom: 12px; }
  .empty h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  .empty p { font-size: 13px; color: var(--text-2); margin-bottom: 16px; }

  /* ============ MODAL ============ */
  .scrim {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,10,10,0.32);
    display: grid; place-items: center;
    padding: 20px;
    animation: fadeIn 150ms ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: 100%; max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-modal);
    overflow: hidden;
    animation: modalIn 180ms ease;
  }
  @keyframes modalIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal__head { padding: 20px 20px 4px; }
  .modal__title { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .modal__sub { font-size: 12px; color: var(--text-2); margin-top: 4px; }
  .modal__body { padding: 16px 20px 20px; }
  .modal__foot {
    padding: 16px 20px;
    display: flex; justify-content: flex-end; gap: 8px;
    border-top: 1px solid var(--border);
    background: #FAFAFA;
  }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-2); }
  .field input, .field select {
    height: 36px; padding: 0 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-input);
    font-size: 13px; color: var(--text);
    outline: 0;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); }

  /* ============ TOAST ============ */
  .toasts {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    background: var(--accent); color: #fff;
    padding: 10px 16px;
    font-size: 13px; font-weight: 500;
    border-radius: var(--r-input);
    box-shadow: var(--shadow-floating);
    animation: toastUp 220ms ease;
    max-width: 90vw;
  }
  .toast--err { background: var(--danger); }
  @keyframes toastUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ============ TAB TRANSITION ============ */
  .tab-enter { animation: tabFade 200ms ease; }
  @keyframes tabFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ============ MENU ============ */
  .menu-wrap { position: relative; }
  .menu {
    position: absolute; right: 0; top: calc(100% + 4px);
    min-width: 140px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-modal);
    z-index: 20;
    padding: 4px;
  }
  .menu button {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 8px 10px;
    font-size: 13px; color: var(--text);
    border-radius: var(--r-input);
    text-align: left;
  }
  .menu button:hover { background: var(--hover); }
  .menu button.is-danger { color: var(--danger); }

  /* ============ MODE BAR (top segmented nav) ============ */
  .modebar {
    height: 48px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    display: flex; align-items: center; justify-content: center;
    padding: 0 20px;
    position: sticky; top: 64px; z-index: 45;
  }
  .modebar__seg {
    display: inline-flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    padding: 3px;
  }
  .modebar__seg button {
    height: 34px; padding: 0 20px;
    font-size: 13px; font-weight: 500;
    color: var(--text-2);
    border-radius: var(--r-input);
    transition: all 150ms;
    display: inline-flex; align-items: center; gap: 6px;
    letter-spacing: -0.01em;
  }
  .modebar__seg button:hover { color: var(--text); }
  .modebar__seg button.is-active { background: var(--accent); color: #fff; }

  /* ============ SOCIAL: CATEGORY BADGES ============ */
  .cbadge {
    display: inline-flex; align-items: center;
    height: 22px; padding: 0 8px;
    border-radius: var(--r-badge);
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.02em;
  }
  .cbadge--gomin     { background: #DBEAFE; color: #1E40AF; }
  .cbadge--chingchan { background: #FEF3C7; color: #B45309; }
  .cbadge--eungwon   { background: #DCFCE7; color: #15803D; }
  .cbadge--suda      { background: #F3E8FF; color: #6B21A8; }

  /* ============ SOCIAL: POST CARD ============ */
  .plist { display: flex; flex-direction: column; gap: 8px; }
  .pcard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 18px 20px;
    transition: border-color 150ms, box-shadow 150ms;
    cursor: pointer;
  }
  .pcard:hover { border-color: var(--border-strong); box-shadow: var(--shadow-hover); }
  .pcard__head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .pcard__nick { font-size: 12px; font-weight: 500; color: var(--text-2); }
  .pcard__time { margin-left: auto; font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }
  .pcard__body {
    font-size: 14px; color: var(--text); line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; word-break: break-word;
  }
  .pcard__tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .tag-pill {
    display: inline-flex; align-items: center;
    height: 20px; padding: 0 8px;
    background: var(--hover); color: var(--text-2);
    border-radius: 10px;
    font-size: 11px; font-weight: 500;
  }
  .pcard__foot {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-top: 12px;
    font-size: 12px; color: var(--text-2);
    font-variant-numeric: tabular-nums;
  }
  .pcard__foot span[data-k] { display: inline-flex; align-items: center; gap: 4px; }
  .pcard__divider { color: var(--text-3); }

  /* ============ SOCIAL: REACTION BUTTONS ============ */
  .reactions { display: flex; gap: 8px; flex-wrap: wrap; }
  .react-btn {
    display: inline-flex; align-items: center; gap: 6px;
    height: 36px; padding: 0 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    color: var(--text-2);
    transition: transform 120ms ease, background 150ms, border-color 150ms, color 150ms;
    font-variant-numeric: tabular-nums;
  }
  .react-btn:hover { border-color: var(--border-strong); color: var(--text); }
  .react-btn:active { transform: scale(0.95); }
  .react-btn.is-active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .react-btn__emoji { font-size: 14px; line-height: 1; }

  /* ============ SOCIAL: POST DETAIL ============ */
  .pdetail__body { font-size: 14px; color: var(--text); line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .pdetail__divider { height: 1px; background: var(--border); margin: 20px 0; }
  .comments__empty { font-size: 12px; color: var(--text-3); padding: 12px 0; }
  .comment { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .comment:last-of-type { border-bottom: 0; }
  .comment__head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .comment__nick { font-size: 12px; font-weight: 500; color: var(--text); }
  .comment__time { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; }
  .comment__body { font-size: 13px; color: var(--text-2); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }

  .reply-form { display: flex; gap: 6px; margin-top: 12px; }
  .reply-form input {
    flex: 1; height: 36px; padding: 0 10px;
    border: 1px solid var(--border); border-radius: var(--r-input);
    background: var(--card); color: var(--text); font-size: 13px; outline: 0;
  }
  .reply-form input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

  /* ============ SOCIAL: BEST LIST ============ */
  .best-list { display: flex; flex-direction: column; gap: 10px; }
  .best-row {
    display: grid; grid-template-columns: 44px 1fr auto; gap: 14px;
    align-items: center;
    padding: 16px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    transition: border-color 150ms, box-shadow 150ms;
    cursor: pointer;
  }
  .best-row:hover { border-color: var(--border-strong); box-shadow: var(--shadow-hover); }
  .best-row__medal {
    font-size: 22px; text-align: center; line-height: 1;
    color: var(--text-2);
    font-weight: 700;
  }
  .best-row__main .pcard__head { margin-bottom: 4px; }
  .best-row__main .pcard__body { -webkit-line-clamp: 2; font-size: 13px; }
  .best-row__stats {
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    font-size: 12px; color: var(--text-2);
    font-variant-numeric: tabular-nums;
    text-align: right; min-width: 70px;
  }
  .best-row__stats strong { color: var(--text); font-size: 14px; font-weight: 600; }

  /* ============ SOCIAL: WRITE ============ */
  .write-form { display: flex; flex-direction: column; gap: 20px; }
  .write-label { font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 8px; display: block; }
  .radio-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .radio-cell {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 14px 10px;
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    background: var(--card);
    cursor: pointer;
    transition: all 150ms;
    text-align: center;
  }
  .radio-cell:hover { border-color: var(--border-strong); }
  .radio-cell.is-active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .radio-cell__label { font-size: 13px; font-weight: 500; }
  .radio-cell__desc  { font-size: 11px; color: var(--text-3); }
  .radio-cell.is-active .radio-cell__desc { color: rgba(255,255,255,0.7); }

  .write-textarea {
    width: 100%;
    min-height: 160px;
    padding: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-input);
    font: inherit; font-size: 14px;
    color: var(--text);
    resize: vertical;
    outline: 0;
    line-height: 1.6;
    letter-spacing: -0.01em;
  }
  .write-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

  .write-counter { font-size: 12px; color: var(--text-3); text-align: right; font-variant-numeric: tabular-nums; margin-top: 6px; }
  .write-counter.is-over { color: var(--danger); }

  .tag-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag-row input {
    flex: 1; min-width: 160px;
    height: 36px; padding: 0 10px;
    border: 1px solid var(--border); border-radius: var(--r-input);
    background: var(--card); color: var(--text); font-size: 13px; outline: 0;
  }
  .tag-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
  .tag-pill--remove {
    background: var(--hover); color: var(--text);
    cursor: pointer;
    padding-right: 24px;
    position: relative;
  }
  .tag-pill--remove::after {
    content: '×';
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 14px; color: var(--text-3);
  }
  .tag-pill--remove:hover::after { color: var(--text); }

  .nickname-preview {
    padding: 14px 16px;
    background: #FAFAFA;
    border: 1px dashed var(--border);
    border-radius: var(--r-card);
    font-size: 13px; color: var(--text-2);
    line-height: 1.6;
  }
  .nickname-preview strong { color: var(--text); font-weight: 600; }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 1023px) {
    .sidebar { display: none; }
    .topbar__search { display: none; }
    .topbar__brand { min-width: auto; flex: 1; }
    .topbar { height: 64px; }
    .mtabs {
      display: flex;
      position: sticky; top: 112px; z-index: 40;
      height: 48px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px; gap: 4px;
    }
    .mtabs button {
      flex: 1;
      font-size: 13px; font-weight: 500;
      color: var(--text-2);
      border-bottom: 2px solid transparent;
      transition: all 150ms;
    }
    .mtabs button.is-active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .main__inner { padding: 24px 20px 96px; max-width: 480px; }
    .page-head { flex-direction: column; align-items: stretch; gap: 12px; }
    .rgrid { grid-template-columns: 1fr; gap: 8px; margin-top: 24px; }
    .hero { padding: 40px 8px 32px; }
    .hero h1 { font-size: 26px; }
    .display { font-size: 26px; }
  }
  @media (max-width: 599px) {
    .table-wrap { display: none; }
  }
  @media (min-width: 600px) {
    .mlist { display: none; }
  }
  @media (max-width: 1023px) {
    .modebar { padding: 0 16px; }
    .radio-row { grid-template-columns: repeat(2, 1fr); }
    .best-row {
      grid-template-columns: 40px 1fr;
      grid-template-rows: auto auto;
      padding: 14px 16px;
    }
    .best-row__stats {
      grid-column: 2; justify-self: start; align-items: flex-start;
      text-align: left; flex-direction: row; gap: 10px;
      min-width: 0;
    }
  }

  /* ============ BALANCE: CATEGORY BADGES ============ */
  .bcat--money   { background: #FEF3C7; color: #B45309; }
  .bcat--food    { background: #FEE2E2; color: #B91C1C; }
  .bcat--home    { background: #DBEAFE; color: #1E40AF; }
  .bcat--work    { background: #E0E7FF; color: #3730A3; }
  .bcat--leisure { background: #DCFCE7; color: #15803D; }

  /* ============ BALANCE: QUESTION CARD ============ */
  .blist { display: flex; flex-direction: column; gap: 16px; }
  .bcard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 28px;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .bcard:hover { border-color: var(--border-strong); }
  .bcard__head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .bcard__nick { font-size: 12px; font-weight: 500; color: var(--text-2); }
  .bcard__time { margin-left: auto; font-size: 12px; color: var(--text-3); font-variant-numeric: tabular-nums; }
  .bcard__title {
    font-size: 20px; font-weight: 700; color: var(--text);
    line-height: 1.4; letter-spacing: -0.01em;
    margin-bottom: 20px; word-break: keep-all;
  }
  .bcard__vs {
    display: grid;
    grid-template-columns: 1fr 36px 1fr;
    gap: 8px;
    align-items: stretch;
  }
  .bcard__divider {
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: var(--text-3);
    letter-spacing: 0.05em;
  }
  .opt-box {
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
    min-height: 140px;
    padding: 18px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    cursor: pointer;
    transition: background 150ms, border-color 150ms, color 150ms, transform 120ms;
    text-align: center;
  }
  .opt-box:hover { border-color: var(--border-strong); }
  .opt-box:active { transform: scale(0.98); }
  .opt-box__emoji { font-size: 36px; line-height: 1; }
  .opt-box__text {
    font-size: 14px; font-weight: 500; color: var(--text);
    word-break: keep-all; line-height: 1.4;
    position: relative; z-index: 2;
  }
  .opt-box__pct {
    font-size: 22px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums;
    position: relative; z-index: 2;
  }
  .opt-box__bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: rgba(0,0,0,0.06);
    width: 0;
    transition: width 800ms cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 1;
  }
  .opt-box.is-selected {
    background: var(--accent);
    border-color: var(--accent);
  }
  .opt-box.is-selected .opt-box__text,
  .opt-box.is-selected .opt-box__pct {
    color: #fff;
  }
  .opt-box.is-selected .opt-box__bar { background: rgba(255,255,255,0.18); }
  .opt-box.is-other {
    background: var(--hover);
  }
  .opt-box.is-other .opt-box__text,
  .opt-box.is-other .opt-box__pct {
    color: var(--text-2);
  }
  .bcard__foot {
    margin-top: 16px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-3);
    font-variant-numeric: tabular-nums;
  }

  /* ============ BALANCE: WRITE FORM ============ */
  .bwrite { display: flex; flex-direction: column; gap: 20px; }
  .bwrite__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .bwrite__opt {
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 16px;
    background: var(--card);
    display: flex; flex-direction: column; gap: 10px;
  }
  .bwrite__opt input[type="text"] {
    height: 36px; padding: 0 10px;
    border: 1px solid var(--border); border-radius: var(--r-input);
    background: var(--card); color: var(--text); font-size: 14px; outline: 0;
  }
  .bwrite__opt input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
  .bwrite__emoji-input {
    width: 72px; text-align: center;
    font-size: 28px !important;
    height: 56px !important;
  }
  .bwrite__label-mini { font-size: 11px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

  @media (max-width: 640px) {
    .bcard { padding: 20px; }
    .bcard__title { font-size: 17px; margin-bottom: 16px; }
    .bcard__vs { grid-template-columns: 1fr 24px 1fr; gap: 6px; }
    .opt-box { min-height: 120px; padding: 14px 10px; }
    .opt-box__emoji { font-size: 30px; }
    .bwrite__grid { grid-template-columns: 1fr; }
  }

  /* ============ LIFE (Q6) ============ */
  .lcard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 22px;
  }
  .lcard + .lcard { margin-top: 16px; }
  .lcard__title {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .lcard__title .hint { font-size: 12px; font-weight: 400; color: var(--text-3); }

  .life-form__grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .life-form__label {
    font-size: 12px; font-weight: 500; color: var(--text-2);
    margin-bottom: 6px; display: block;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    height: 30px; padding: 0 12px;
    border-radius: 999px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text-2); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s ease;
    display: inline-flex; align-items: center;
  }
  .chip:hover { border-color: var(--text-3); color: var(--text); }
  .chip.is-active {
    background: var(--text); color: var(--bg);
    border-color: var(--text);
  }

  .money-input {
    height: 40px; padding: 0 14px;
    border: 1px solid var(--border); border-radius: var(--r-input);
    background: var(--card); color: var(--text);
    font-size: 15px; font-weight: 500; outline: 0;
    font-variant-numeric: tabular-nums;
    width: 100%;
  }
  .money-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

  .savings-preview {
    margin-top: 14px; padding: 16px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--r-card);
    display: flex; align-items: center; justify-content: space-between;
  }
  .savings-preview__label { font-size: 13px; color: var(--text-2); }
  .savings-preview__val {
    font-size: 22px; font-weight: 600; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .savings-preview__val.is-neg { color: #c0392b; }
  .savings-preview__val.is-good { color: #27ae60; }

  .lfilters { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 16px; }
  .lfilters__group { display: flex; flex-direction: column; gap: 6px; }
  .lfilters__group-label {
    font-size: 11px; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500;
  }

  .lstat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  }
  .lstat {
    padding: 14px;
    border: 1px solid var(--border); border-radius: var(--r-card);
    background: var(--card);
  }
  .lstat__label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.04em; }
  .lstat__value {
    font-size: 22px; font-weight: 600; color: var(--text);
    font-variant-numeric: tabular-nums; margin-top: 4px;
  }
  .lstat__unit { font-size: 12px; font-weight: 400; color: var(--text-3); margin-left: 2px; }

  .hbar-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .hbar-row__label {
    flex: 0 0 64px; font-size: 13px; color: var(--text-2);
  }
  .hbar {
    flex: 1; height: 10px; border-radius: 999px;
    background: var(--bg); border: 1px solid var(--border);
    overflow: hidden; position: relative;
  }
  .hbar__fill {
    height: 100%;
    background: linear-gradient(90deg, #4f7cff, #6ea0ff);
    border-radius: 999px;
    transition: width 800ms cubic-bezier(0.4, 0.0, 0.2, 1);
  }
  .hbar__fill.is-me {
    background: linear-gradient(90deg, #ff6b6b, #ff9876);
  }
  .hbar__fill.is-muted {
    background: linear-gradient(90deg, #9aa3b2, #b8bfca);
  }
  .hbar-row__value {
    flex: 0 0 auto; font-size: 12px; color: var(--text-2);
    font-variant-numeric: tabular-nums; min-width: 54px; text-align: right;
  }

  .position-card {
    background: linear-gradient(135deg, #4f7cff 0%, #6b63ff 100%);
    color: #fff;
    border-radius: var(--r-card);
    padding: 28px 24px;
    text-align: center;
  }
  .position-card__tier {
    font-size: 13px; opacity: 0.85; letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .position-card__pct {
    font-size: 48px; font-weight: 700; letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .position-card__pct-label { font-size: 14px; opacity: 0.9; margin-left: 4px; }
  .position-card__desc { font-size: 13px; opacity: 0.9; margin-top: 8px; }

  /* ---- Rank tier gradients (Q6 tier badges) ---- */
  .position-card.tier-diamond { background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%); }
  .position-card.tier-gold    { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
  .position-card.tier-silver  { background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%); }
  .position-card.tier-bronze  { background: linear-gradient(135deg, #b45309 0%, #78350f 100%); }
  .position-card.tier-starter { background: linear-gradient(135deg, #6b7280 0%, #374151 100%); }

  .rank-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 28px; font-weight: 800; letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .rank-badge__emoji { font-size: 32px; line-height: 1; }
  .rank-top {
    font-size: 15px; opacity: 0.95; letter-spacing: 0.02em;
    margin-bottom: 2px;
  }
  .rank-row {
    font-size: 14px; opacity: 0.92; margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .rank-bar {
    margin-top: 14px; height: 8px; border-radius: 999px;
    background: rgba(255,255,255,0.22); overflow: hidden;
  }

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

/* ============ SESSION ============ */
const SID_KEY = 'honsam_sid';
function getSessionId() {
  let sid = null;
  try { sid = localStorage.getItem(SID_KEY); } catch (e) {}
  if (!sid) {
    sid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now() + '-' + Math.random().toString(36).slice(2));
    try { localStorage.setItem(SID_KEY, sid); } catch (e) {}
  }
  return sid;
}
function apiFetch(url, opts = {}) {
  const headers = { ...(opts.headers || {}), 'x-session-id': getSessionId() };
  return fetch(url, { ...opts, headers });
}

/* ============ API ============ */
const api = {
  listIngredients: () => fetch('/api/ingredients').then(r => r.json()),
  createIngredient: (data) => fetch('/api/ingredients', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(r => r.json()),
  updateIngredient: (id, data) => fetch('/api/ingredients?id=' + id, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(r => r.json()),
  deleteIngredient: (id) => fetch('/api/ingredients?id=' + id, { method: 'DELETE' }),
  generateRecipes: () => fetch('/api/recipe', { method: 'POST' }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'generate failed'); }
    return r.json();
  }),
  listRecipes: () => fetch('/api/recipe').then(r => r.json()),

  // Social (Q4)
  listPosts: (sort, category) => {
    const q = new URLSearchParams();
    if (sort) q.set('sort', sort);
    if (category && category !== '전체') q.set('category', category);
    return apiFetch('/api/posts?' + q.toString()).then(r => r.json());
  },
  createPost: (data) => apiFetch('/api/posts', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'create failed'); }
    return r.json();
  }),
  bestPosts: () => apiFetch('/api/posts?view=best').then(r => r.json()),
  listComments: (postId) => apiFetch('/api/comments?post_id=' + postId).then(r => r.json()),
  createComment: (postId, content) => apiFetch('/api/comments', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ post_id: postId, content })
  }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'comment failed'); }
    return r.json();
  }),
  toggleReaction: (postId, type) => apiFetch('/api/reactions', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ post_id: postId, reaction_type: type })
  }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'reaction failed'); }
    return r.json();
  }),

  // Balance (Q5)
  listBalance: (sort, category) => {
    const q = new URLSearchParams();
    if (sort) q.set('sort', sort);
    if (category && category !== '전체') q.set('category', category);
    return apiFetch('/api/balance?' + q.toString()).then(r => r.json());
  },
  createBalance: (data) => apiFetch('/api/balance', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'create failed'); }
    return r.json();
  }),
  rankingBalance: () => apiFetch('/api/balance/ranking').then(r => r.json()),
  vote: (questionId, choice) => apiFetch('/api/vote', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question_id: questionId, choice })
  }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'vote failed'); }
    return r.json();
  }),

  // Life (Q6)
  meLife: () => apiFetch('/api/life/me').then(r => r.json()),
  submitLife: (data) => apiFetch('/api/life', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
  }).then(async r => {
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || 'submit failed'); }
    return r.json();
  }),
  statsLife: (job, age) => {
    const q = new URLSearchParams();
    if (job && job !== '전체') q.set('job', job);
    if (age && age !== '전체') q.set('age', age);
    return apiFetch('/api/life/stats?' + q.toString()).then(r => r.json());
  },

  // Fortune (Q7)
  todayFortune: () => apiFetch('/api/fortune').then(async r => {
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || '운세를 불러오지 못했어요');
    return data;
  }),
  historyFortune: () => apiFetch('/api/fortune?view=history').then(async r => {
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || '운세 기록을 불러오지 못했어요');
    return data;
  }),

  // Home landing copy (session 무관)
  getLanding: () => fetch('/api/fortune?view=landing').then(async r => {
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || '랜딩 카피를 불러오지 못했어요');
    return data;
  }),
};

/* ============ UTILS ============ */
function daysUntil(isoDate) {
  if (!isoDate) return null;
  const d = new Date(isoDate); const now = new Date();
  d.setHours(0,0,0,0); now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}
function ddayClass(n) {
  if (n == null) return '';
  if (n < 0) return 'dday--past';
  if (n <= 2) return 'dday--danger';
  if (n <= 5) return 'dday--warn';
  return '';
}
function ddayLabel(n) {
  if (n == null) return '';
  if (n < 0) return Math.abs(n) + '일 지남';
  if (n === 0) return 'D-DAY';
  return 'D-' + n;
}
function categoryBadgeClass(cat) {
  if (cat === '냉장') return 'badge--chill';
  if (cat === '실온') return 'badge--room';
  if (cat === '냉동') return 'badge--freeze';
  return 'badge--plain';
}
function versionClass(v) {
  if (v === '초간단') return 'vbadge--easy';
  if (v === '든든한') return 'vbadge--hearty';
  if (v === '색다른') return 'vbadge--unique';
  return 'vbadge--easy';
}
function versionAscii(v) {
  if (v === '초간단') return 'EASY';
  if (v === '든든한') return 'HEARTY';
  if (v === '색다른') return 'UNIQUE';
  return v;
}
function parseIngredients(raw) {
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'string') { try { return JSON.parse(raw); } catch { return [raw]; } }
  return [];
}
function notionUrl(pageId) {
  if (!pageId) return null;
  return 'https://www.notion.so/' + String(pageId).replace(/-/g, '');
}
function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const h = String(d.getHours()).padStart(2,'0'); const m = String(d.getMinutes()).padStart(2,'0');
  return h + ':' + m;
}
function fmtDateHeader(iso) {
  const d = new Date(iso);
  const wk = ['일','월','화','수','목','금','토'][d.getDay()];
  return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 ' + wk + '요일';
}
function groupByDay(list) {
  const map = new Map();
  for (const item of list) {
    const key = (item.created_at || '').split('T')[0];
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  }
  return Array.from(map.entries()).sort((a, b) => (a[0] < b[0] ? 1 : -1));
}

/* ============ ICON ============ */
function Icon({ name, size, className, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (window.lucide && ref.current) {
      ref.current.setAttribute('data-lucide', name);
      ref.current.innerHTML = '';
      window.lucide.createIcons({ nameAttr: 'data-lucide', icons: window.lucide.icons, attrs: {}, elements: [ref.current] });
    }
  }, [name]);
  const style = size ? { width: size, height: size } : undefined;
  return <i ref={ref} data-lucide={name} className={className} style={style} {...rest} />;
}

function useLucide(dep) {
  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [dep]);
}

/* ============ TOAST ============ */
const ToastCtx = createContext(null);
function ToastProvider({ children }) {
  const [items, setItems] = useState([]);
  const push = useCallback((msg, kind = 'ok') => {
    const id = Math.random().toString(36).slice(2);
    setItems(prev => [...prev, { id, msg, kind }]);
    setTimeout(() => setItems(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="toasts">
        {items.map(t => (
          <div key={t.id} className={'toast' + (t.kind === 'err' ? ' toast--err' : '')}>{t.msg}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

/* ============ LAYOUT ============ */
function TopBar({ tab }) {

    { id: 'recipe',  icon: 'chef-hat',       label: '만들기' },
    { id: 'history', icon: 'history',        label: '기록' },
  ],
  social: [
    { id: 'talk',  icon: 'message-circle', label: '혼삶톡' },
    { id: 'best',  icon: 'trophy',         label: '베스트' },
    { id: 'write', icon: 'pencil-line',    label: '쓰기' },
  ],
  balance: [
    { id: 'play',  icon: 'scale',        label: '투표' },
    { id: 'rank',  icon: 'trophy',       label: '인기' },

function Sidebar({ mode, tab, setTab }) {
  useLucide(mode + ':' + tab);
  const items = SIDEBAR_ITEMS[mode] || SIDEBAR_ITEMS.food;
  if (items.length === 0) return null;
  const label = mode === 'social' ? 'Social'
              : mode === 'balance' ? 'Balance'
              : mode === 'life' ? 'Life'
              : mode === 'fortune' ? 'Fortune'
              : 'Workspace';
  return (
    <aside className="sidebar">
      <div className="side-label">{label}</div>
      {items.map(it => (
        <button key={it.id}
          className={'side-item' + (tab === it.id ? ' is-active' : '')}
          onClick={() => setTab(it.id)}>
          <Icon name={it.icon} />
          <span>{it.label}</span>
        </button>
      ))}
    </aside>
  );
}

function MobileTabs({ mode, tab, setTab }) {
  const items = (SIDEBAR_ITEMS[mode] || SIDEBAR_ITEMS.food).map(it => ({ id: it.id, label: it.label }));
  if (items.length === 0) return null;
  return (
    <nav className="mtabs">
      {items.map(it => (
        <button key={it.id}
          className={tab === it.id ? 'is-active' : ''}
          onClick={() => setTab(it.id)}>{it.label}</button>
      ))}
    </nav>
  );
}

function ModeBar({ mode, setMode }) {
  return (
    <div className="modebar">
      <div className="modebar__seg">
        <button className={mode === 'home' ? 'is-active' : ''} onClick={() => setMode('home')}><span className="ico">🏠</span><span className="lbl">홈</span></button>
        <button className={mode === 'food' ? 'is-active' : ''} onClick={() => setMode('food')}><span className="ico">🍳</span><span className="lbl">식생활</span></button>
        <button className={mode === 'social' ? 'is-active' : ''} onClick={() => setMode('social')}><span className="ico">💬</span><span className="lbl">소셜</span></button>
        <button className={mode === 'balance' ? 'is-active' : ''} onClick={() => setMode('balance')}><span className="ico">🎮</span><span className="lbl">밸런스</span></button>
        <button className={mode === 'life' ? 'is-active' : ''} onClick={() => setMode('life')}><span className="ico">📊</span><span className="lbl">라이프</span></button>
        <button className={mode === 'fortune' ? 'is-active' : ''} onClick={() => setMode('fortune')}><span className="ico">🔮</span><span className="lbl">운세</span></button>

}

/* ============ FRIDGE ============ */
function FridgeTab() {
  const toast = useToast();
  const [list, setList] = useState(null);
  const [filter, setFilter] = useState('all');
  const [modal, setModal] = useState(null); // {mode:'add'} | {mode:'edit', item}
  const [confirm, setConfirm] = useState(null);
  const [menuId, setMenuId] = useState(null);

  const load = useCallback(async () => {
    try { setList(await api.listIngredients()); }
    catch (e) { toast('재료를 불러오지 못했어요', 'err'); setList([]); }
  }, [toast]);

  useEffect(() => { load(); }, [load]);
  useLucide(list);

  useEffect(() => {
    const close = () => setMenuId(null);
    if (menuId) { window.addEventListener('click', close); return () => window.removeEventListener('click', close); }
  }, [menuId]);

  const counts = useMemo(() => {
    const src = list || [];
    const urgent = src.filter(x => { const d = daysUntil(x.expiry); return d != null && d <= 3; }).length;
    return {
      all:    src.length,
      chill:  src.filter(x => x.category === '냉장').length,
      room:   src.filter(x => x.category === '실온').length,
      freeze: src.filter(x => x.category === '냉동').length,
      urgent,
    };
  }, [list]);

  const filtered = useMemo(() => {
    if (!list) return [];
    if (filter === 'all') return list;
    if (filter === 'urgent') return list.filter(x => { const d = daysUntil(x.expiry); return d != null && d <= 3; });
    const map = { chill: '냉장', room: '실온', freeze: '냉동' };
    return list.filter(x => x.category === map[filter]);
  }, [list, filter]);

  async function onSave(data) {
    try {
      if (modal.mode === 'add') { await api.createIngredient(data); toast('재료를 추가했어요'); }
      else { await api.updateIngredient(modal.item.id, data); toast('재료를 수정했어요'); }
      setModal(null); load();
    } catch (e) { toast('저장에 실패했어요', 'err'); }
  }
  async function onDelete() {
    try { await api.deleteIngredient(confirm.id); toast('삭제했어요'); setConfirm(null); load(); }
    catch (e) { toast('삭제에 실패했어요', 'err'); }
  }

  if (list === null) return (
    <div className="tab-enter">
      <div className="page-head"><div><div className="page-head__title">냉장고</div><div className="page-head__sub">불러오는 중…</div></div></div>
      <div className="progress"><div className="progress__bar"/></div>
    </div>
  );

  const chips = [
    { id: 'all',    label: '전체',     count: counts.all },
    { id: 'chill',  label: '냉장',     count: counts.chill },
    { id: 'room',   label: '실온',     count: counts.room },
    { id: 'freeze', label: '냉동',     count: counts.freeze },
    { id: 'urgent', label: '임박',     count: counts.urgent },
  ];

  return (
    <div className="tab-enter">
      <div className="page-head">
        <div>
          <div className="page-head__title">냉장고</div>
          <div className="page-head__sub">재료 {counts.all}개</div>
        </div>
        <button className="btn btn--primary" onClick={() => setModal({ mode: 'add' })}>
          <Icon name="plus" size={14} /> 재료 추가
        </button>
      </div>

      <div className="chips" style={{ marginBottom: 20 }}>
        {chips.map(c => (
          <button key={c.id}
            className={'chip' + (filter === c.id ? ' is-active' : '')}
            onClick={() => setFilter(c.id)}>
            {c.label}
            <span className="chip__count">{c.count}</span>
          </button>
        ))}
      </div>

      {filtered.length === 0 ? (
        <EmptyState icon="refrigerator" title="재료가 없습니다" desc="냉장고에 재료를 추가해 보세요">
          <button className="btn btn--primary" onClick={() => setModal({ mode: 'add' })}>
            <Icon name="plus" size={14} /> 재료 추가
          </button>
        </EmptyState>
      ) : (<>
        {/* Desktop table */}
        <div className="table-wrap">
          <table className="table">
            <thead><tr>
              <th>재료</th><th>수량</th><th>카테고리</th><th>유통기한</th><th>D-day</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.map(item => {
                const d = daysUntil(item.expiry);
                return (
                  <tr key={item.id}>
                    <td className="cell--name">{item.name}</td>
                    <td className="cell--muted">{item.quantity || '-'}</td>
                    <td><span className={'badge ' + categoryBadgeClass(item.category)}>{item.category || '-'}</span></td>
                    <td className="cell--muted">{item.expiry || '-'}</td>
                    <td><span className={'dday ' + ddayClass(d)}>{ddayLabel(d) || '-'}</span></td>
                    <td className="cell--actions">
                      <RowMenu
                        open={menuId === item.id}
                        onOpen={() => setMenuId(item.id)}
                        onEdit={() => { setMenuId(null); setModal({ mode: 'edit', item }); }}
                        onDelete={() => { setMenuId(null); setConfirm(item); }} />
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Mobile list */}
        <div className="mlist">
          {filtered.map(item => {
            const d = daysUntil(item.expiry);
            return (
              <div className="mrow" key={item.id}>
                <div>
                  <div className="mrow__name">{item.name} <span className="muted" style={{ fontWeight: 400 }}>· {item.quantity || '-'}</span></div>
                  <div className="mrow__meta">
                    <span className={'badge ' + categoryBadgeClass(item.category)}>{item.category}</span>
                    <span>{item.expiry || '유통기한 미지정'}</span>
                  </div>
                </div>
                <div className="mrow__right">
                  <span className={'dday ' + ddayClass(d)}>{ddayLabel(d) || '—'}</span>
                  <RowMenu
                    open={menuId === item.id}
                    onOpen={() => setMenuId(item.id)}
                    onEdit={() => { setMenuId(null); setModal({ mode: 'edit', item }); }}
                    onDelete={() => { setMenuId(null); setConfirm(item); }} />
                </div>
              </div>
            );
          })}
        </div>
      </>)}

      {modal && <IngredientModal mode={modal.mode} item={modal.item} onClose={() => setModal(null)} onSave={onSave} />}
      {confirm && <ConfirmModal
        title="재료 삭제"
        desc={`‘${confirm.name}’을(를) 삭제할까요? 이 작업은 되돌릴 수 없어요.`}
        onClose={() => setConfirm(null)} onConfirm={onDelete} />}
    </div>
  );
}

function RowMenu({ open, onOpen, onEdit, onDelete }) {
  return (
    <div className="menu-wrap" onClick={(e) => e.stopPropagation()}>
      <button className="btn btn--icon" onClick={onOpen} aria-label="메뉴">
        <Icon name="more-horizontal" />
      </button>
      {open && (
        <div className="menu">
          <button onClick={onEdit}><Icon name="pencil" size={14} />수정</button>
          <button className="is-danger" onClick={onDelete}><Icon name="trash" size={14} />삭제</button>
        </div>
      )}
    </div>
  );
}

function EmptyState({ icon, title, desc, children }) {
  useLucide(icon);
  return (
    <div className="empty">
      <Icon name={icon} size={24} />
      <h3>{title}</h3>
      <p>{desc}</p>
      {children}
    </div>
  );
}

function IngredientModal({ mode, item, onClose, onSave }) {
  const [form, setForm] = useState(() => ({
    name: item?.name || '',
    quantity: item?.quantity || '',
    category: item?.category || '냉장',
    expiry: item?.expiry ? item.expiry.split('T')[0] : '',
    allergen: !!item?.allergen,
  }));
  const [busy, setBusy] = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!form.name.trim()) return;
    setBusy(true);
    await onSave({ ...form, expiry: form.expiry || null });
    setBusy(false);
  }

  return (
    <div className="scrim" onClick={onClose}>
      <form className="modal" onClick={e => e.stopPropagation()} onSubmit={submit}>
        <div className="modal__head">
          <div className="modal__title">{mode === 'add' ? '재료 추가' : '재료 수정'}</div>
          <div className="modal__sub">냉장고에 있는 재료 정보를 입력하세요</div>
        </div>
        <div className="modal__body">
          <div className="field">
            <label>이름</label>
            <input autoFocus value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="예: 계란" required />
          </div>
          <div className="field-row">
            <div className="field">
              <label>수량</label>
              <input value={form.quantity} onChange={e => setForm(f => ({ ...f, quantity: e.target.value }))} placeholder="6개" />
            </div>
            <div className="field">
              <label>카테고리</label>
              <select value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>
                <option>냉장</option><option>실온</option><option>냉동</option>
              </select>
            </div>
          </div>
          <div className="field">
            <label>유통기한</label>
            <input type="date" value={form.expiry} onChange={e => setForm(f => ({ ...f, expiry: e.target.value }))} />
          </div>
          <label className="field-check">
            <input type="checkbox" checked={form.allergen} onChange={e => setForm(f => ({ ...f, allergen: e.target.checked }))} />
            알레르기 주의 재료
          </label>
        </div>
        <div className="modal__foot">
          <button type="button" className="btn btn--ghost" onClick={onClose}>취소</button>
          <button type="submit" className="btn btn--primary" disabled={busy}>{busy ? '저장 중…' : '저장'}</button>
        </div>
      </form>
    </div>
  );
}

function ConfirmModal({ title, desc, onClose, onConfirm }) {
  const [busy, setBusy] = useState(false);
  return (
    <div className="scrim" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 360 }}>
        <div className="modal__head">
          <div className="modal__title">{title}</div>
          <div className="modal__sub">{desc}</div>
        </div>
        <div className="modal__foot">
          <button className="btn btn--ghost" onClick={onClose}>취소</button>
          <button className="btn btn--danger" disabled={busy} onClick={async () => { setBusy(true); await onConfirm(); setBusy(false); }}>삭제</button>
        </div>
      </div>
    </div>
  );
}

/* ============ RECIPE TAB ============ */
function RecipeTab() {
  const toast = useToast();
  const [loading, setLoading] = useState(false);
  const [recipes, setRecipes] = useState(null);

  async function run() {
    setLoading(true); setRecipes(null);
    try {
      const res = await api.generateRecipes();
      setRecipes(res.recipes || []);
      toast('레시피 ' + (res.recipes?.length || 0) + '개를 만들었어요');
    } catch (e) {
      toast(e.message || '레시피 생성 실패', 'err');
    } finally { setLoading(false); }
  }

  return (
    <div className="tab-enter">
      <div className="hero">
        <div className="eyebrow">AI RECIPE GENERATOR</div>
        <h1>오늘 뭐 해먹지?</h1>
        <p>냉장고 재료로 3가지 레시피를 제안합니다</p>
        <div className="hero__actions">
          <button className="btn btn--primary btn--lg" onClick={run} disabled={loading}>
            {loading ? '생성 중…' : '레시피 생성'}
          </button>
        </div>
      </div>

      {loading && (
        <div className="loading-line">
          <div className="progress"><div className="progress__bar" /></div>
          <p>Claude가 레시피를 분석 중입니다…</p>
        </div>
      )}

      {recipes && recipes.length > 0 && (
        <div className="rgrid">
          {recipes.map(r => <RecipeResultCard key={r.id} r={r} />)}
        </div>
      )}

      {recipes && recipes.length === 0 && (
        <EmptyState icon="chef-hat" title="레시피를 만들지 못했어요" desc="재료를 먼저 추가해 주세요." />
      )}
    </div>
  );
}

function RecipeResultCard({ r }) {
  useLucide(r.id);
  const ing = parseIngredients(r.ingredients);
  const link = notionUrl(r.notion_page_id);
  return (
    <article className="rcard">
      <div className="rcard__head">
        <span className={'vbadge ' + versionClass(r.version)}>{r.version} · {versionAscii(r.version)}</span>
        <div className="rcard__title">{r.title}</div>
        <div className="rcard__meta">
          <Icon name="flame" size={12} /><span>{r.calories ?? '-'} kcal</span>
          <span className="rcard__meta-dot">·</span>
          <Icon name="clock" size={12} /><span>{r.cook_time ?? '-'}분</span>
          <span className="rcard__meta-dot">·</span>
          <span>{r.difficulty || ''}</span>
        </div>
        <div className="rcard__ingredients">{ing.map(x => typeof x === 'string' ? x : x.name).join(' · ')}</div>
      </div>

      <div className="rcard__divider" />

      <div className="rcard__section-label">조리 순서</div>
      <div className="rcard__steps">{r.steps || '-'}</div>

      {r.tip && (
        <div className="rcard__tip">
          <Icon name="lightbulb" size={14} />
          <span>{r.tip}</span>
        </div>
      )}

      {link && (
        <a className="rcard__link" href={link} target="_blank" rel="noreferrer">
          Notion에서 보기 <Icon name="arrow-right" size={12} />
        </a>
      )}
    </article>
  );
}

/* ============ HISTORY ============ */
function HistoryTab() {
  const toast = useToast();
  const [list, setList] = useState(null);
  const [seg, setSeg] = useState('all');
  const [detail, setDetail] = useState(null);

  useEffect(() => {
    api.listRecipes().then(setList).catch(() => { toast('기록을 불러오지 못했어요', 'err'); setList([]); });
  }, [toast]);
  useLucide(list);

  const filtered = useMemo(() => {
    if (!list) return [];
    if (seg === 'all') return list;
    return list.filter(x => x.version === seg);
  }, [list, seg]);

  const grouped = useMemo(() => groupByDay(filtered), [filtered]);

  if (list === null) return (
    <div className="tab-enter">
      <div className="page-head"><div><div className="page-head__title">기록</div><div className="page-head__sub">불러오는 중…</div></div></div>
      <div className="progress"><div className="progress__bar" /></div>
    </div>
  );

  const segments = [
    { id: 'all', label: '전체' },
    { id: '초간단', label: '초간단' },
    { id: '든든한', label: '든든한' },
    { id: '색다른', label: '색다른' },
  ];

  return (
    <div className="tab-enter">
      <div className="hist-head">
        <div>
          <div className="page-head__title">기록</div>
          <div className="page-head__sub">누적 {list.length}개</div>
        </div>
        <div className="segment">
          {segments.map(s => (
            <button key={s.id}
              className={seg === s.id ? 'is-active' : ''}
              onClick={() => setSeg(s.id)}>{s.label}</button>
          ))}
        </div>
      </div>

      {grouped.length === 0 ? (
        <EmptyState icon="history" title="기록이 없어요" desc="'만들기' 탭에서 레시피를 생성하면 여기에 쌓입니다" />
      ) : (
        grouped.map(([day, items]) => (
          <div key={day} className="hist-group">
            <div className="hist-group__label">{day ? fmtDateHeader(day) : '—'}</div>
            {items.map(item => (
              <div key={item.id} className="hitem" onClick={() => setDetail(item)}>
                <div>
                  <div className="hitem__top">
                    <span className={'vbadge ' + versionClass(item.version)}>{versionAscii(item.version)}</span>
                    <span className="hitem__title">{item.title}</span>
                  </div>
                  <div className="hitem__meta" style={{ marginTop: 4 }}>
                    {item.calories ?? '-'}kcal · {item.cook_time ?? '-'}분 · {item.difficulty || ''}
                  </div>
                </div>
                <div className="hitem__time">{fmtTime(item.created_at)}</div>
              </div>
            ))}
          </div>
        ))
      )}

      {detail && <HistoryDetailModal item={detail} onClose={() => setDetail(null)} />}
    </div>
  );
}

            <Icon name="clock" size={12} /><span>{item.cook_time ?? '-'}분</span>
            <span className="rcard__meta-dot">·</span>
            <span>{item.difficulty}</span>
          </div>
        </div>
        <div className="modal__body">
          <div className="rcard__section-label">재료</div>

          <div className="rcard__divider" />
          <div className="rcard__section-label">조리 순서</div>
          <div className="rcard__steps">{item.steps || '-'}</div>
          {item.tip && (
            <div className="rcard__tip" style={{ marginTop: 16 }}>
              <Icon name="lightbulb" size={14} />
              <span>{item.tip}</span>
            </div>
          )}
        </div>

/* ============ SOCIAL: CONSTANTS + HELPERS ============ */
const CATEGORIES = ['고민','칭찬','응원','수다'];
const CATEGORY_FILTERS = ['전체', ...CATEGORIES];
const CATEGORY_META = {
  '고민': { cls: 'cbadge--gomin',     desc: '이야기하고 풀기' },
  '칭찬': { cls: 'cbadge--chingchan', desc: '잘한 나를 자랑' },
  '응원': { cls: 'cbadge--eungwon',   desc: '힘내라는 한마디' },
  '수다': { cls: 'cbadge--suda',      desc: '편하게 수다' },
};
const REACTION_META = [
  { type: 'like',    emoji: '💙', label: '공감', key: 'like_count' },
  { type: 'cheer',   emoji: '🤗', label: '응원', key: 'cheer_count' },
  { type: 'sparkle', emoji: '✨', label: '칭찬', key: 'sparkle_count' },
];
const ANIMALS_CLIENT = ['고양이','강아지','부엉이','여우','햄스터','판다','토끼','다람쥐','펭귄','코알라'];
const ADJS_CLIENT    = ['지친','뿌듯한','다정한','감성','배고픈','씩씩한','조용한','엉뚱한','따뜻한','귀여운'];

function previewNickname() {
  const a  = ADJS_CLIENT[Math.floor(Math.random() * ADJS_CLIENT.length)];
  const an = ANIMALS_CLIENT[Math.floor(Math.random() * ANIMALS_CLIENT.length)];
  const n  = Math.floor(Math.random() * 9999) + 1;
  return a + ' ' + an + ' #' + n;
}

function timeAgo(iso) {
  if (!iso) return '';
  const t = new Date(iso);
  const diffMin = Math.floor((Date.now() - t.getTime()) / 60000);
  if (diffMin < 1) return '방금';
  if (diffMin < 60) return diffMin + '분 전';
  const diffH = Math.floor(diffMin / 60);
  if (diffH < 24) return diffH + '시간 전';
  const diffD = Math.floor(diffH / 24);
  if (diffD < 7) return diffD + '일 전';
  return (t.getMonth() + 1) + '/' + t.getDate();
}

function parseTags(raw) {
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'string') { try { const v = JSON.parse(raw); return Array.isArray(v) ? v : []; } catch { return []; } }
  return [];
}

function applyToggleLocal(post, type) {
  const key = type === 'like' ? 'like_count' : type === 'cheer' ? 'cheer_count' : 'sparkle_count';
  const my = Array.isArray(post.my_reactions) ? [...post.my_reactions] : [];
  const has = my.includes(type);
  const newMy = has ? my.filter(t => t !== type) : [...my, type];
  const newCount = Math.max(0, (post[key] ?? 0) + (has ? -1 : 1));
  return { ...post, my_reactions: newMy, [key]: newCount };
}

/* ============ SOCIAL: WRITE ============ */
function SocialWriteTab({ goToTalk }) {
  const toast = useToast();
  const [category, setCategory] = useState('수다');
  const [content, setContent] = useState('');
  const [tags, setTags] = useState([]);
  const [tagInput, setTagInput] = useState('');
  const [preview, setPreview] = useState(() => previewNickname());
  const [busy, setBusy] = useState(false);

  function addTag() {
    const v = tagInput.trim().replace(/^#/, '');
    if (!v) return;
    if (tags.length >= 5) { toast('태그는 최대 5개예요', 'err'); return; }
    if (tags.includes(v)) { setTagInput(''); return; }
    setTags([...tags, v]);
    setTagInput('');
  }
  function onTagKey(e) {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTag(); }
    else if (e.key === 'Backspace' && tagInput === '' && tags.length > 0) { setTags(tags.slice(0, -1)); }
  }

  async function submit(e) {
    e.preventDefault();
    if (!content.trim()) { toast('본문을 입력해주세요', 'err'); return; }
    if (content.length > 500) { toast('500자를 넘을 수 없어요', 'err'); return; }
    setBusy(true);
    try {
      await api.createPost({ category, content: content.trim(), tags });
      toast('익명으로 게시되었어요');
      setContent(''); setTags([]); setTagInput(''); setPreview(previewNickname());
      goToTalk?.();
    } catch (err) {
      toast(err.message || '게시 실패', 'err');
    } finally { setBusy(false); }
  }

  const over = content.length > 500;

  return (
    <div className="tab-enter">
      <div className="page-head">
        <div>
          <div className="page-head__title">쓰기</div>
          <div className="page-head__sub">닉네임은 서버에서 랜덤으로 정해져요</div>
        </div>
      </div>

      <form className="write-form" onSubmit={submit}>
        <div>
          <label className="write-label">카테고리</label>
          <div className="radio-row">
            {CATEGORIES.map(c => (
              <button type="button" key={c}
                className={'radio-cell' + (category === c ? ' is-active' : '')}
                onClick={() => setCategory(c)}>
                <div className="radio-cell__label">{c}</div>
                <div className="radio-cell__desc">{CATEGORY_META[c]?.desc}</div>
              </button>
            ))}
          </div>
        </div>

        <div>
          <label className="write-label">본문</label>
          <textarea
            className="write-textarea"
            value={content}
            onChange={e => setContent(e.target.value)}
            placeholder="편하게 하고 싶은 이야기를 남겨 보세요 (최대 500자)"
          />
          <div className={'write-counter' + (over ? ' is-over' : '')}>{content.length} / 500</div>
        </div>

        <div>
          <label className="write-label">태그 (선택 · 최대 5개)</label>
          <div className="tag-row">
            {tags.map((t, i) => (
              <span key={i} className="tag-pill tag-pill--remove" onClick={() => setTags(tags.filter((_, j) => j !== i))}>
                #{t}
              </span>
            ))}
            <input
              value={tagInput}
              onChange={e => setTagInput(e.target.value)}
              onKeyDown={onTagKey}
              placeholder={tags.length >= 5 ? '태그 5개가 꽉 찼어요' : '엔터로 태그 추가'}
              maxLength={20}
              disabled={tags.length >= 5}
            />
          </div>
        </div>

        <div className="nickname-preview">
          당신은 이번에 <strong>{preview}</strong> 로 게시됩니다. <br />
          실제 닉네임은 게시 순간 서버에서 다시 뽑혀요.
        </div>

        <button type="submit" className="btn btn--primary btn--lg" style={{ width: '100%', minWidth: 0 }} disabled={busy || over || !content.trim()}>
          {busy ? '게시 중…' : '익명으로 게시하기'}
        </button>
      </form>
    </div>
  );
}

/* ============ BALANCE: QUESTION CARD ============ */
function BalanceQuestionCard({ q, onVote, compact = false }) {
  const voted = q.user_choice === 'A' || q.user_choice === 'B';
  const total = Math.max(q.total_votes || 0, 0);
  const pctA = total > 0 ? Math.round(((q.vote_a_count || 0) / total) * 100) : 0;
  const pctB = total > 0 ? 100 - pctA : 0;
  const meta = BALANCE_CATEGORY_META[q.category] || { cls: 'bcat--work' };

  function handleClick(choice) {
    if (q.user_choice === choice) return;
    onVote?.(q.id, choice);
  }

  function renderOpt(side) {
    const isA = side === 'A';
    const emoji = isA ? (q.emoji_a || '🅰️') : (q.emoji_b || '🅱️');
    const text = isA ? q.option_a : q.option_b;
    const pct = isA ? pctA : pctB;
    const selected = voted && q.user_choice === side;
    const other = voted && q.user_choice !== side;
    const cls = 'opt-box' + (selected ? ' is-selected' : '') + (other ? ' is-other' : '');
    return (
      <div className={cls} onClick={() => handleClick(side)} role="button">
        {voted && <div className="opt-box__bar" style={{ width: pct + '%' }} />}
        <div className="opt-box__emoji">{emoji}</div>
        <div className="opt-box__text">{text}</div>
        {voted && <div className="opt-box__pct">{pct}%</div>}
      </div>
    );
  }

  return (
    <div className="bcard" style={compact ? { padding: 20 } : undefined}>
      <div className="bcard__head">
        <span className={'cbadge ' + meta.cls}>{q.category}</span>
        <span className="bcard__nick">{q.nickname}</span>
        <span className="bcard__time">{timeAgo(q.created_at)}</span>
      </div>
      <div className="bcard__title" style={compact ? { fontSize: 16, marginBottom: 14 } : undefined}>{q.title}</div>
      <div className="bcard__vs">
        {renderOpt('A')}
        <div className="bcard__divider">VS</div>
        {renderOpt('B')}
      </div>
      <div className="bcard__foot">

function BalancePlayTab() {
  const toast = useToast();
  const [list, setList] = useState(null);
  const [category, setCategory] = useState('전체');
  const [sort, setSort] = useState('latest');

  const load = useCallback(async () => {
    try { setList(await api.listBalance(sort, category)); }
    catch { toast('질문을 불러오지 못했어요', 'err'); setList([]); }
  }, [sort, category, toast]);

  useEffect(() => { load(); }, [load]);

  async function handleVote(questionId, choice) {
    const before = list;
    // Optimistic: toggle/move vote immediately
    setList(prev => prev ? prev.map(q => {
      if (q.id !== questionId) return q;
      let a = q.vote_a_count || 0;
      let b = q.vote_b_count || 0;
      const prevChoice = q.user_choice;
      if (prevChoice === 'A') a = Math.max(a - 1, 0);
      if (prevChoice === 'B') b = Math.max(b - 1, 0);
      if (choice === 'A') a += 1; else b += 1;
      return { ...q, vote_a_count: a, vote_b_count: b, total_votes: a + b, user_choice: choice };
    }) : prev);
    try {
      const res = await api.vote(questionId, choice);
      setList(prev => prev ? prev.map(q => q.id === questionId ? { ...q, ...res } : q) : prev);
    } catch (err) {
      setList(before);
      toast(err.message || '투표 실패', 'err');
    }
  }

  if (list === null) return (
    <div className="tab-enter">
      <div className="page-head"><div><div className="page-head__title">밸런스</div><div className="page-head__sub">불러오는 중…</div></div></div>
      <div className="progress"><div className="progress__bar"/></div>
    </div>
  );

  return (
    <div className="tab-enter">
      <div className="page-head">
        <div>
          <div className="page-head__title">밸런스</div>
          <div className="page-head__sub">둘 중 하나, 당신의 선택은?</div>
        </div>
        <div className="segment">
          <button className={sort === 'latest' ? 'is-active' : ''} onClick={() => setSort('latest')}>최신순</button>
          <button className={sort === 'popular' ? 'is-active' : ''} onClick={() => setSort('popular')}>인기순</button>
        </div>
      </div>

      <div className="chips" style={{ marginBottom: 20 }}>
        {BALANCE_CATEGORY_FILTERS.map(c => (
          <button key={c}
            className={'chip' + (category === c ? ' is-active' : '')}
            onClick={() => setCategory(c)}>{c}</button>
        ))}
      </div>

      {list.length === 0 ? (
        <EmptyState icon="scale" title="아직 질문이 없어요" desc="첫 번째 밸런스 질문을 만들어 보세요" />
      ) : (
        <div className="blist">
          {list.map(q => (
            <BalanceQuestionCard key={q.id} q={q} onVote={handleVote} />
          ))}
        </div>
      )}
    </div>
  );
}

  { key: 'expense_telecom',      icon: '📱',  label: '통신비' },
  { key: 'expense_subscription', icon: '📺',  label: '구독료' },
  { key: 'expense_shopping',     icon: '👔',  label: '쇼핑' },
  { key: 'expense_pet',          icon: '🐾',  label: '반려동물', hint: '반려동물 없으면 0' },

];

function formatMan(n) {
  if (!Number.isFinite(Number(n))) return '0만';
  return Number(n).toLocaleString() + '만';
}

function rankTier(topPct) {
  if (topPct <= 10) return { key: 'diamond', emoji: '💎', name: 'DIAMOND', cls: 'tier-diamond' };
  if (topPct <= 30) return { key: 'gold',    emoji: '🥇', name: 'GOLD',    cls: 'tier-gold' };
  if (topPct <= 50) return { key: 'silver',  emoji: '🥈', name: 'SILVER',  cls: 'tier-silver' };
  if (topPct <= 70) return { key: 'bronze',  emoji: '🥉', name: 'BRONZE',  cls: 'tier-bronze' };
  return                   { key: 'starter', emoji: '⭐', name: 'STARTER', cls: 'tier-starter' };
}

function savingsTitle(ratePct) {
  if (ratePct >= 50) return { label: '절약왕 👑',          cls: 'st-king' };
  if (ratePct >= 30) return { label: '알뜰살림 👍',         cls: 'st-good' };
  if (ratePct >= 10) return { label: '평균 이상 🙂',        cls: 'st-avg' };
  return                    { label: '지출 관리 필요 ⚠️', cls: 'st-warn' };
}

function HBar({ value, max, accent = 'default', label, right }) {
  const pct = max > 0 ? Math.min(100, Math.max(0, Math.round((value / max) * 100))) : 0;
  const cls = 'hbar__fill' + (accent === 'me' ? ' is-me' : accent === 'muted' ? ' is-muted' : '');
  return (
    <div className="hbar-row">
      {label != null && <div className="hbar-row__label">{label}</div>}
      <div className="hbar"><div className={cls} style={{ width: pct + '%' }} /></div>
      {right != null && <div className="hbar-row__value">{right}</div>}
    </div>
  );
}

/* ---- LifeInputTab ---- */
function LifeInputTab({ goToCompare }) {
  const toast = useToast();
  const [loaded, setLoaded] = useState(false);
  const [age, setAge] = useState(null);
  const [job, setJob] = useState(null);
  const [exp, setExp] = useState(null);
  const [region, setRegion] = useState(null);
  const [salary, setSalary] = useState('');
  const [exps, setExps] = useState({
    expense_housing: '', expense_food: '', expense_transport: '',
    expense_telecom: '', expense_subscription: '',
    expense_shopping: '', expense_pet: '', expense_leisure: '',
  });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const me = await api.meLife();
        if (me) {
          setAge(me.age_group); setJob(me.job_category);
          setExp(me.experience_years); setRegion(me.region);
          setSalary(String(me.monthly_salary || ''));
          setExps({
            expense_housing:      String(me.expense_housing      || ''),
            expense_food:         String(me.expense_food         || ''),
            expense_transport:    String(me.expense_transport    || ''),
            expense_telecom:      String(me.expense_telecom      || ''),
            expense_subscription: String(me.expense_subscription || ''),
            expense_shopping:     String(me.expense_shopping     || ''),
            expense_pet:          String(me.expense_pet          || ''),
            expense_leisure:      String(me.expense_leisure      || ''),
          });
        }
      } catch {}
      setLoaded(true);
    })();
  }, []);

  const salaryNum = parseInt(salary, 10) || 0;
  const totalExp = LIFE_EXPENSES.reduce((s, e) => s + (parseInt(exps[e.key], 10) || 0), 0);
  const remain = salaryNum - totalExp;
  const savingsRate = salaryNum > 0 ? Math.round((remain / salaryNum) * 100) : 0;

  async function handleSubmit() {
    if (!age || !job || !exp || !region) {
      toast('나이·직업·경력·지역을 모두 선택해 주세요', 'err');
      return;
    }
    if (!salaryNum || salaryNum <= 0) {
      toast('월 실수령액을 입력해 주세요', 'err');
      return;
    }
    setSaving(true);
    try {
      await api.submitLife({
        age_group: age, job_category: job, experience_years: exp, region,
        monthly_salary: salaryNum,
        ...Object.fromEntries(LIFE_EXPENSES.map(e => [e.key, parseInt(exps[e.key], 10) || 0])),
      });
      toast('저장했어요. 내 등급을 확인해 볼까요?');
      goToCompare?.();
    } catch (e) {
      toast(e.message || '저장 실패', 'err');
    } finally {
      setSaving(false);
    }
  }

  if (!loaded) return <div className="empty">불러오는 중…</div>;

  return (
    <div>
      <div className="lcard">
        <div className="lcard__title">
          기본 정보 <span className="hint">· 익명으로 통계에 반영돼요</span>
        </div>
        <div className="life-form__grid">
          <div>
            <div className="life-form__label">나이대</div>
            <div className="chip-row">
              {LIFE_AGES.map(a => (
                <button key={a}
                  className={'chip' + (age === a ? ' is-active' : '')}
                  onClick={() => setAge(a)}>{a}</button>
              ))}
            </div>
          </div>
          <div>
            <div className="life-form__label">직업군</div>
            <div className="chip-row">
              {LIFE_JOBS.map(j => (
                <button key={j}
                  className={'chip' + (job === j ? ' is-active' : '')}
                  onClick={() => setJob(j)}>{j}</button>
              ))}
            </div>
          </div>
          <div>
            <div className="life-form__label">경력</div>
            <div className="chip-row">
              {LIFE_EXPS.map(e => (
                <button key={e}
                  className={'chip' + (exp === e ? ' is-active' : '')}
                  onClick={() => setExp(e)}>{e}</button>
              ))}
            </div>
          </div>
          <div>
            <div className="life-form__label">지역</div>
            <div className="chip-row">
              {LIFE_REGIONS.map(r => (
                <button key={r}
                  className={'chip' + (region === r ? ' is-active' : '')}
                  onClick={() => setRegion(r)}>{r}</button>
              ))}
            </div>
          </div>
        </div>
      </div>

      <div className="lcard">
        <div className="lcard__title">월 실수령액 <span className="hint">· 만원 단위</span></div>
        <input type="number" inputMode="numeric" className="money-input"
          placeholder="예: 350"
          value={salary}
          onChange={(e) => setSalary(e.target.value)} />
      </div>

      <div className="lcard">
        <div className="lcard__title">월 지출 내역 <span className="hint">· 만원 단위, 비워두면 0</span></div>
        <div className="life-form__grid">
          {LIFE_EXPENSES.map(e => (
            <div key={e.key}>
              <div className="life-form__label">
                {e.icon} {e.label}
                {e.hint && <span style={{ textTransform: 'none', letterSpacing: 0, color: 'var(--text-3)', fontWeight: 400, marginLeft: 6 }}>· {e.hint}</span>}
              </div>
              <input type="number" inputMode="numeric" className="money-input"
                placeholder="0"
                value={exps[e.key]}
                onChange={(ev) => setExps(p => ({ ...p, [e.key]: ev.target.value }))} />
            </div>
          ))}
        </div>

        <div className="savings-preview">
          <div>
            <div className="savings-preview__label">
              월 저축 가능액 ({totalExp.toLocaleString()}만 지출)
            </div>
          </div>
          <div className={
            'savings-preview__val ' +
            (salaryNum === 0 ? '' : remain < 0 ? 'is-neg' : savingsRate >= 20 ? 'is-good' : '')
          }>
            {salaryNum === 0 ? '—' : `${remain.toLocaleString()}만 (${savingsRate}%)`}

        </div>
      </div>

      <button className="btn" style={{ marginTop: 18 }}
        onClick={handleSubmit} disabled={saving}>
        {saving ? '저장 중…' : '저장하고 내 등급 보기'}
      </button>
    </div>
  );
}

function Stars({ score, size }) {
  const n = Math.max(0, Math.min(5, Number(score) || 0));
  const filled = '★'.repeat(n);
  const dim = '★'.repeat(5 - n);
  return (
    <span style={size ? { fontSize: size } : null}>
      <span>{filled}</span>
      <span className="dim">{dim}</span>
    </span>
  );
}

function formatFortuneDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  if (Number.isNaN(d.getTime())) return s;
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}

        </div>
      </div>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
